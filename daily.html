  --border-highlight: rgba(255, 255, 255, 0.6);
  --shadow: 0 8px 32px rgba(30, 10, 40, 0.2);
  --shadow-sm: 0 4px 12px rgba(30, 10, 40, 0.15);
  --shadow-lg: 0 16px 48px rgba(30, 10, 40, 0.25);
  --glass-blur: blur(12px) saturate(120%);
  --accent-math: #ffffff;
  --accent-eng: #ffffff;
  --accent-routine: #ffffff;
  --accent-dday: #ffffff;
  --gradient-progress: #ffffff;
  --gradient-hero: rgba(255, 255, 255, 0.15);
  --gradient-hero-overlay: linear-gradient(180deg, rgba(255,255,255,0.1) 0%, transparent 100%);
  --checkbox-done: #ffffff;
  --toast-bg: rgba(255, 255, 255, 0.9);
  --card-radius: 16px;
  --transition-spring: 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  --transition-fast: 0.15s cubic-bezier(0.34, 1.56, 0.64, 1);
  --transition-med: 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  --transition-slow: 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
}

[data-theme="dark"] {
  --glass-noise: none;
  --bg-primary: linear-gradient(180deg, #1d1236 0%, #521c3b 50%, #8c3c2a 100%);
  --bg-secondary: rgba(255, 255, 255, 0.05);
  --bg-card: rgba(0, 0, 0, 0.3);
  --bg-card-hover: rgba(0, 0, 0, 0.4);
  --text-primary: #ffffff;
  --text-secondary: rgba(255, 255, 255, 0.8);
  --text-muted: rgba(255, 255, 255, 0.5);
  --border: rgba(255, 255, 255, 0.18);
  --border-subtle: rgba(255, 255, 255, 0.1);
  --border-highlight: rgba(255, 255, 255, 0.3);
  --shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
  --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.4);
  --shadow-lg: 0 16px 48px rgba(0, 0, 0, 0.55);
  --checkbox-done: #ffffff;
  --toast-bg: rgba(0, 0, 0, 0.85);
  --gradient-progress: #ffffff;
  --gradient-hero: rgba(0, 0, 0, 0.2);
  --gradient-hero-overlay: linear-gradient(180deg, rgba(255,255,255,0.05) 0%, transparent 100%);
}

/* ══════════════════════════════════════════
   RESET & BASE
   ══════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html {
  -webkit-text-size-adjust: 100%;
  scroll-behavior: smooth;
}

body {
  font-family: 'Pretendard Variable', 'Pretendard', -apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif;
  background: var(--bg-primary);
  background-attachment: fixed;
  color: var(--text-primary);
  min-height: 100vh;
  line-height: 1.6;
  transition: background var(--transition-med), color var(--transition-med);
  overflow-x: hidden;
  position: relative;
  isolation: isolate;
}
body::before, body::after {
  content: ''; position: fixed; z-index: -1; border-radius: 50%;
  filter: blur(70px); opacity: 0; pointer-events: none;
  transition: opacity .5s;
}
body::before, body::after {
  display: none;
}
[data-theme="dark"] body::before, [data-theme="dark"] body::after {
  display: none;
}

::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(0, 200, 255, 0.25); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: rgba(0, 200, 255, 0.4); }

@keyframes orbDrift {
  0%   { transform: translate(-8%, -6%) scale(1); }
  50%  { transform: translate(6%, 8%) scale(1.15); }
  100% { transform: translate(-8%, -6%) scale(1); }
}
@keyframes orbDrift2 {
  0%   { transform: translate(6%, -8%) scale(1.1); }
  50%  { transform: translate(-8%, 6%) scale(1); }
  100% { transform: translate(6%, -8%) scale(1.1); }
}

/* ══════════════════════════════════════════
   KEYFRAMES
   ══════════════════════════════════════════ */
@keyframes fadeSlideUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

@keyframes shimmer {
  0%   { background-position: -200% center; }
  100% { background-position: 200% center; }
}

@keyframes springPop {
  0% { transform: scale(0.5); opacity: 0.5; }
  50% { transform: scale(1.2); }
  100% { transform: scale(1); opacity: 1; }
}

@keyframes checkBounce {
  0%   { transform: scale(0.7); }
  50%  { transform: scale(1.15); }
  100% { transform: scale(1); }
}

@keyframes checkDraw {
  from { stroke-dashoffset: 20; }
  to   { stroke-dashoffset: 0; }
}

@keyframes pulseGlow {
  0%, 100% { box-shadow: 0 0 0 0 rgba(102, 126, 234, 0.4); }
  50%      { box-shadow: 0 0 0 8px rgba(102, 126, 234, 0); }
}

@keyframes sparkle {
  0%   { opacity: 0; transform: scale(0) rotate(0deg); }
  50%  { opacity: 1; transform: scale(1) rotate(180deg); }
  100% { opacity: 0; transform: scale(0) rotate(360deg); }
}

@keyframes confetti-fall {
  0%   { transform: translateY(-10px) rotate(0deg); opacity: 1; }
  100% { transform: translateY(40px) rotate(360deg); opacity: 0; }
}

@keyframes slideUp {
  from { transform: translateX(-50%) translateY(80px); opacity: 0; }
  to   { transform: translateX(-50%) translateY(0); opacity: 1; }
}

@keyframes slideDown {
  from { transform: translateX(-50%) translateY(0); opacity: 1; }
  to   { transform: translateX(-50%) translateY(80px); opacity: 0; }
}

@keyframes heroGradient {
  0%   { background-position: 0% 50%; }
  50%  { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

@keyframes float {
  0%, 100% { transform: translateY(0); }
  50%      { transform: translateY(-4px); }
}

/* ══════════════════════════════════════════
   LAYOUT
   ══════════════════════════════════════════ */
.container {
  max-width: 520px;
  margin: 0 auto;
  padding: 0 16px 32px;
}

/* ══════════════════════════════════════════
   THEME TOGGLE
   ══════════════════════════════════════════ */
.theme-toggle {
  position: fixed;
  top: 16px;
  left: 16px;
  z-index: 1000;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--bg-card);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.2rem;
  box-shadow: var(--shadow-sm), inset 0 1px 0 var(--border-highlight);
  transition: transform var(--transition-spring), box-shadow var(--transition-spring);
  user-select: none;
}
.theme-toggle:hover {
  transform: scale(1.08);
}
.theme-toggle:active {
  transform: scale(0.95);
}

/* ══════════════════════════════════════════
   HERO SECTION
   ══════════════════════════════════════════ */
.hero {
  background: var(--gradient-hero);
  background-size: 200% 200%;
  animation: heroGradient 8s ease infinite;
  border-radius: 0 0 28px 28px;
  padding: 52px 24px 28px;
  margin-bottom: 20px;
  position: relative;
  overflow: hidden;
}
.hero::after {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--gradient-hero-overlay);
  pointer-events: none;
}
.hero-content {
  position: relative;
  z-index: 1;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}
.hero-left {
  flex: 1;
}
.hero-date {
  font-size: 0.8rem;
  color: rgba(255,255,255,0.75);
  font-weight: 400;
  margin-bottom: 4px;
}
.hero-stage {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 6px;
  flex-wrap: wrap;
}
.stage-badge {
  display: inline-flex;
  align-items: center;
  background: rgba(255,255,255,0.2);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  color: #fff;
  border-radius: 20px;
  padding: 3px 12px;
  font-size: 0.73rem;
  font-weight: 600;
  border: 1px solid rgba(255,255,255,0.15);
}
.hero-day {
  color: #fff;
  font-size: 0.95rem;
  font-weight: 600;
}
.loop-info {
  color: rgba(255,255,255,0.6);
  font-size: 0.78rem;
  font-weight: 400;
}
.hero-right {
  text-align: center;
  flex-shrink: 0;
}
.dday-ring-wrap {
  position: relative;
  width: 96px;
  height: 96px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.dday-ring-svg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  transform: rotate(-90deg);
}
.dday-ring-track { opacity: 0.2; }
.dday-ring-fill { transition: stroke-dashoffset 1.2s cubic-bezier(0.4,0,0.2,1); }
.dday-inner {
  position: relative;
  z-index: 1;
  text-align: center;
}
.dday-label {
  font-size: 0.62rem;
  color: rgba(255,255,255,0.6);
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.dday-num {
  font-size: 2rem;
  font-weight: 800;
  color: #fff;
  line-height: 1.1;
  letter-spacing: -1px;
  text-shadow: 0 2px 12px rgba(0,0,0,0.2);
}
.dday-sub {
  font-size: 0.6rem;
  color: rgba(255,255,255,0.45);
  margin-top: 1px;
  white-space: nowrap;
}

/* Streak badge */
.streak-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 20px;
  padding: 4px 12px;
  font-size: 0.72rem;
  color: #fff;
  font-weight: 600;
  margin-top: 10px;
  animation: float 3s ease-in-out infinite;
}
.streak-badge .fire { font-size: 0.85rem; }

/* ══════════════════════════════════════════
   PROGRESS BAR
   ══════════════════════════════════════════ */
.progress-section {
  padding: 0 4px;
  margin-bottom: 16px;
  animation: fadeSlideUp 0.5s ease both;
  animation-delay: 0.1s;
}
.progress-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}
.progress-label {
  font-size: 0.78rem;
  color: var(--text-muted);
  font-weight: 500;
}
.progress-pct {
  font-size: 0.82rem;
  font-weight: 700;
  background: var(--gradient-progress);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.bar-track {
  height: 10px;
  background: var(--border);
  border-radius: 999px;
  overflow: hidden;
  position: relative;
}
.bar-fill {
  height: 100%;
  border-radius: 999px;
  background: var(--gradient-progress);
  transition: width var(--transition-slow);
  position: relative;
  min-width: 0;
}
.bar-fill::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
  background-size: 200% 100%;
  animation: shimmer 2s ease-in-out infinite;
}
.bar-fill.complete {
  background: linear-gradient(135deg, #10b981 0%, #34d399 50%, #6ee7b7 100%);
}

/* ══════════════════════════════════════════
   CARDS (Glassmorphism)
   ══════════════════════════════════════════ */
.card {
  background: var(--bg-card);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  border-top: 1px solid var(--border-highlight);
  border-left: 1px solid var(--border-highlight);
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  border-radius: var(--card-radius);
  padding: 16px 18px;
  margin-bottom: 12px;
  box-shadow: var(--shadow);
  transition: transform var(--transition-spring), box-shadow var(--transition-spring), background var(--transition-spring);
  animation: fadeSlideUp 0.5s var(--transition-spring) both;
}
.card-header {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 0.85rem;
  font-weight: 700;
  margin-bottom: 12px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border-subtle);
}
.card-icon {
  width: 28px;
  height: 28px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.95rem;
  flex-shrink: 0;
}
.card-icon.routine { background: hsla(0, 72%, 55%, 0.12); }
.card-icon.math    { background: hsla(220, 70%, 55%, 0.12); }
.card-icon.eng     { background: hsla(155, 60%, 40%, 0.12); }
.card-title { flex: 1; color: var(--text-primary); }
.card-title.routine { color: var(--accent-routine); }
.card-title.math    { color: var(--accent-math); }
.card-title.eng     { color: var(--accent-eng); }
.card-sub {
  font-size: 0.72rem;
  font-weight: 600;
  color: var(--text-muted);
  background: var(--border);
  padding: 2px 8px;
  border-radius: 12px;
}

/* ══════════════════════════════════════════
   TASK ITEMS
   ══════════════════════════════════════════ */
.task {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 9px 8px;
  border-radius: 10px;
  cursor: pointer;
  transition: transform var(--transition-fast), background var(--transition-fast);
  position: relative;
}
.task:not(:last-child) {
  border-bottom: 1px solid var(--border-subtle);
}
.task:hover {
  background: var(--bg-card-hover);
}
.task:active {
  background: var(--bg-card-hover);
}
.task.done .task-text {
  text-decoration: line-through;
  color: var(--text-muted);
}
.task.saving {
  opacity: 0.5;
  pointer-events: none;
}

/* Custom Checkbox */
.cb {
  flex-shrink: 0;
  margin-top: 2px;
  width: 20px;
  height: 20px;
  border: 2px solid var(--text-muted);
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--transition-fast);
  position: relative;
}
.cb.on {
  background: var(--checkbox-done);
  border-color: var(--checkbox-done);
  animation: springPop 0.5s var(--transition-spring) forwards;
}
.cb.on svg {
  animation: checkDraw 0.3s ease forwards;
}
.cb.saving {
  border-color: var(--accent-math);
  animation: pulseGlow 1s infinite;
}
.cb svg {
  stroke-dasharray: 20;
  stroke-dashoffset: 0;
}

.task-text {
  font-size: 0.84rem;
  line-height: 1.5;
  color: var(--text-primary);
  transition: color var(--transition-fast);
  word-break: keep-all;
}

/* ══════════════════════════════════════════
   CARRYOVER BANNER
   ══════════════════════════════════════════ */
.banner {
  background: var(--bg-card);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  border: 1px solid hsla(35, 90%, 55%, 0.3);
  border-left: 3px solid var(--accent-dday);
  border-radius: 12px;
  padding: 10px 14px;
  font-size: 0.78rem;
  color: var(--text-secondary);
  margin-bottom: 12px;
  animation: fadeSlideUp 0.5s ease both;
}

/* ══════════════════════════════════════════
   CELEBRATION (100%)
   ══════════════════════════════════════════ */
.celebrate-wrap {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 900;
  overflow: hidden;
}
.confetti-piece {
  position: absolute;
  width: 8px;
  height: 8px;
  border-radius: 2px;
  top: -10px;
  animation: confetti-fall 2.5s ease-in forwards;
}

/* ══════════════════════════════════════════
   MEMO / REFLECTION
   ══════════════════════════════════════════ */
.memo-card {
  background: var(--bg-card);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  border: 1px solid var(--border);
  border-radius: var(--card-radius);
  padding: 16px 18px;
  margin-bottom: 12px;
  box-shadow: var(--shadow-sm);
  animation: fadeSlideUp 0.5s ease both;
  position: relative;
  overflow: hidden;
}
.memo-card::before {
  content: '';
  position: absolute;
  inset: -1px;
  border-radius: var(--card-radius);
  padding: 1px;
  background: linear-gradient(135deg, rgba(102,126,234,0.3), rgba(118,75,162,0.3), rgba(240,147,251,0.3));
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  pointer-events: none;
  opacity: 0.5;
  transition: opacity var(--transition-med);
}
.memo-card:focus-within::before {
  opacity: 1;
}
.memo-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}
.memo-title {
  font-size: 0.85rem;
  font-weight: 700;
  color: var(--text-primary);
  display: flex;
  align-items: center;
  gap: 6px;
}
.memo-charcount {
  font-size: 0.7rem;
  color: var(--text-muted);
  font-weight: 400;
}
.memo-textarea {
  width: 100%;
  min-height: 80px;
  max-height: 200px;
  resize: vertical;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: var(--bg-secondary);
  color: var(--text-primary);
  font-family: inherit;
  font-size: 0.84rem;
  line-height: 1.6;
  padding: 10px 12px;
  outline: none;
  transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
}
.memo-textarea::placeholder {
  color: var(--text-muted);
}
.memo-textarea:focus {
  border-color: rgba(102, 126, 234, 0.4);
  box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
}
.memo-saved {
  font-size: 0.68rem;
  color: var(--text-muted);
  margin-top: 6px;
  text-align: right;
  opacity: 0;
  transition: opacity var(--transition-fast);
}
.memo-saved.visible { opacity: 1; }

/* ══════════════════════════════════════════
   TOAST
   ══════════════════════════════════════════ */
#toast {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--toast-bg);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  color: #fff;
  padding: 10px 20px;
  border-radius: 14px;
  font-size: 0.82rem;
  font-weight: 500;
  pointer-events: none;
  z-index: 999;
  white-space: nowrap;
  border: 1px solid rgba(255,255,255,0.08);
  box-shadow: 0 8px 24px rgba(0,0,0,0.2);
  opacity: 0;
  transition: none;
}
#toast.show {
  animation: slideUp 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}
#toast.hide {
  animation: slideDown 0.3s ease forwards;
}
#toast.err-toast {
  background: rgba(220, 38, 38, 0.9);
}

/* ══════════════════════════════════════════
   STATE / LOADING / FOOTER
   ══════════════════════════════════════════ */
.state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
  font-size: 0.9rem;
}
.state.err { color: var(--accent-routine); }
.state small {
  display: block;
  margin-top: 10px;
  font-size: 0.76rem;
  color: var(--text-muted);
  background: var(--bg-card);
  border-radius: 10px;
  padding: 10px;
  text-align: left;
  white-space: pre-wrap;
  word-break: break-all;
}
.state .loading-dots::after {
  content: '';
  animation: dots 1.4s steps(4) infinite;
}
@keyframes dots {
  0%  { content: ''; }
  25% { content: '.'; }
  50% { content: '..'; }
  75% { content: '...'; }
}

.footer {
  text-align: center;
  font-size: 0.72rem;
  color: var(--text-muted);
  margin-top: 8px;
  padding-bottom: 16px;
}

/* ══════════════════════════════════════════
   ANIMATION DELAYS (stagger)
   ══════════════════════════════════════════ */
.card:nth-child(1) { animation-delay: 0.05s; }
.card:nth-child(2) { animation-delay: 0.12s; }
.card:nth-child(3) { animation-delay: 0.19s; }
.card:nth-child(4) { animation-delay: 0.26s; }
.card:nth-child(5) { animation-delay: 0.33s; }
.card:nth-child(6) { animation-delay: 0.40s; }
.card:nth-child(7) { animation-delay: 0.47s; }

/* ══════════════════════════════════════════
   UNIVERSITY MOTIVATION CARD
   ══════════════════════════════════════════ */
.univ-card {
  background: var(--bg-card);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  border-top: 1px solid var(--border-highlight);
  border-left: 1px solid var(--border-highlight);
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  border-radius: var(--card-radius);
  margin-bottom: 10px;
  overflow: hidden;
  box-shadow: var(--shadow);
  animation: fadeSlideUp .5s ease both;
}
.univ-card-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 11px 14px;
  cursor: pointer;
  font-size: 0.84rem; font-weight: 700;
  user-select: none;
}
.univ-card-header:hover { background: rgba(0,0,0,0.02); }
[data-theme="dark"] .univ-card-header:hover { background: rgba(255,255,255,0.03); }
.univ-toggle-icon { font-size: 0.7rem; color: var(--text-muted); transition: transform .25s; }
.univ-toggle-icon.open { transform: rotate(180deg); }
.univ-card-body { display: none; padding: 0 14px 14px; }
.univ-card-body.open { display: block; }
.univ-tabs { display: flex; gap: 6px; margin-bottom: 12px; }
.univ-tab {
  flex: 1; padding: 7px 4px; border: none; border-radius: 10px;
  font-family: inherit; font-size: 0.78rem; font-weight: 700;
  cursor: pointer; background: var(--border); color: var(--text-secondary);
  transition: all .2s;
}
.univ-tab.active { color: #fff; }
.univ-tab.ku.active { background: #8B0000; }
.univ-tab.su.active { background: #1e3a5f; }
.univ-reasons { display: none; }
.univ-reasons.active { display: block; }
.univ-reason {
  display: flex; gap: 10px; padding: 8px 0;
  border-bottom: 1px solid var(--border-subtle);
  align-items: flex-start;
}
.univ-reason:last-child { border-bottom: none; }
.univ-reason-icon { font-size: 1.2rem; flex-shrink: 0; margin-top: 1px; }
.univ-reason-title { font-size: 0.82rem; font-weight: 700; color: var(--text-primary); }
.univ-reason-desc { font-size: 0.74rem; color: var(--text-secondary); margin-top: 1px; }
.hero-banner-strip {
  background: rgba(0,0,0,0.18);
  padding: 6px 20px;
  font-size: 0.72rem;
  color: rgba(255,255,255,0.85);
  text-align: center;
  letter-spacing: 0.01em;
}

/* ══════════════════════════════════════════
   TIME CHIP + QUICK ADD
   ══════════════════════════════════════════ */
.time-chip {
  font-size: 0.68rem; font-weight: 500;
  padding: 2px 8px; border-radius: 20px;
  margin-left: auto; flex-shrink: 0;
  opacity: 0.8;
}
.time-chip.math-chip { background: hsla(220,70%,55%,.12); color: var(--accent-math); }
.time-chip.eng-chip  { background: hsla(155,60%,40%,.12); color: var(--accent-eng); }
.card.active-block { border-left: 3px solid var(--accent-math); animation: blockPulse 2.5s ease-in-out infinite; }
.card.active-block.eng-block { border-left-color: var(--accent-eng); }
@keyframes blockPulse {
  0%,100% { border-left-color: var(--accent-math); }
  50% { border-left-color: transparent; }
}
.card.active-block.eng-block { animation: blockPulseEng 2.5s ease-in-out infinite; }
@keyframes blockPulseEng {
  0%,100% { border-left-color: var(--accent-eng); }
  50% { border-left-color: transparent; }
}
.quick-add { padding: 4px 4px 2px; }
.qa-btn {
  width: 100%; padding: 7px; border: 1.5px dashed var(--border);
  border-radius: 8px; background: transparent; color: var(--text-muted);
  font-family: inherit; font-size: 0.78rem; cursor: pointer;
  transition: all .15s;
}
.qa-btn:hover { border-color: var(--accent-math); color: var(--accent-math); background: hsla(220,70%,55%,.05); }
.qa-form { padding: 6px 0 2px; animation: fadeSlideUp .2s ease; }
.qa-input {
  width: 100%; padding: 8px 10px;
  border: 1px solid var(--border); border-radius: 8px;
  background: var(--bg-card); color: var(--text-primary);
  font-family: inherit; font-size: 0.82rem;
  outline: none; transition: border-color .15s;
}
.qa-input:focus { border-color: var(--accent-math); }
.qa-actions { display: flex; gap: 6px; margin-top: 6px; }
.qa-submit {
  padding: 5px 14px; border: none; border-radius: 7px;
  background: var(--accent-math); color: #35235d;
  font-family: inherit; font-size: 0.78rem; font-weight: 600; cursor: pointer;
}
.qa-cancel {
  padding: 5px 10px; border: 1px solid var(--border); border-radius: 7px;
  background: transparent; color: var(--text-muted);
  font-family: inherit; font-size: 0.78rem; cursor: pointer;
}

/* ══════════════════════════════════════════
   DECA GARDIA
   ══════════════════════════════════════════ */
.deca-card {
  background: linear-gradient(145deg, #1a0d05 0%, #2c1810 100%);
  border: 1px solid #5c3318;
  border-radius: var(--card-radius);
  margin-bottom: 10px;
  overflow: hidden;
  animation: fadeSlideUp .5s ease both;
  animation-delay: .08s;
}
.deca-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 11px 14px 8px;
}
.deca-title-group { display: flex; align-items: center; gap: 8px; }
.deca-title-text { font-size: 0.85rem; font-weight: 700; color: #e8d5b0; }
.deca-subtitle { font-size: 0.68rem; color: #9a7050; font-style: italic; }
.deca-header-right { display: flex; align-items: center; gap: 8px; }
.deca-loop-count { font-size: 0.72rem; color: #c4a070; }
.deca-loop-count strong { color: #f0c060; font-size: 0.95rem; }
.deca-view-btn {
  padding: 4px 10px; border: 1px solid #5c3318;
  border-radius: 8px; background: rgba(92,51,24,0.3);
  color: #c4a070; font-family: inherit; font-size: 0.7rem;
  cursor: pointer; transition: all .2s;
}
.deca-view-btn:hover { background: rgba(92,51,24,0.6); color: #f0c060; }

/* Desk scene */
.deca-scene {
  position: relative; width: 100%; height: 240px;
  background: linear-gradient(180deg, #0d0500 0%, #1a0a02 40%, #2c1408 100%);
  overflow: hidden;
  transition: all .8s ease;
}
.deca-overlay {
  position: absolute; inset: 0;
  background: rgba(0,0,0,0.75);
  transition: opacity 1s ease;
  pointer-events: none; z-index: 5;
}
.deca-scene[data-loops="0"] .deca-overlay { opacity: 0.72; }
.deca-scene[data-loops="1"] .deca-overlay { opacity: 0.60; }
.deca-scene[data-loops="2"] .deca-overlay { opacity: 0.50; }
.deca-scene[data-loops="3"] .deca-overlay { opacity: 0.40; }
.deca-scene[data-loops="4"] .deca-overlay { opacity: 0.32; }
.deca-scene[data-loops="5"] .deca-overlay { opacity: 0.24; }
.deca-scene[data-loops="6"] .deca-overlay { opacity: 0.16; }
.deca-scene[data-loops="7"] .deca-overlay { opacity: 0.10; }
.deca-scene[data-loops="8"] .deca-overlay { opacity: 0.06; }
.deca-scene[data-loops="9"] .deca-overlay { opacity: 0.03; }
.deca-scene[data-loops="10"] .deca-overlay { opacity: 0; }

.deca-mat {
  position: absolute;
  bottom: 24px; left: 8%; right: 8%;
  height: 160px;
  background: linear-gradient(160deg, #3d2010 0%, #2a1408 100%);
  border-radius: 10px 10px 4px 4px;
  border: 1px solid #5c3318;
  transition: filter 1.2s ease, box-shadow 1s ease;
}
.deca-mat[data-age="1"] { filter: brightness(0.95) saturate(1.05); }
.deca-mat[data-age="2"] { filter: brightness(0.90) saturate(1.10); box-shadow: inset 0 0 20px rgba(0,0,0,.3); }
.deca-mat[data-age="3"] { filter: brightness(0.85) saturate(1.15); box-shadow: inset 0 0 35px rgba(0,0,0,.4); }
.deca-mat[data-age="4"] { filter: brightness(0.80) saturate(1.20); box-shadow: inset 0 0 50px rgba(0,0,0,.5), inset 0 0 10px rgba(180,100,20,.1); }
.deca-mat[data-age="5"] { filter: brightness(0.75) saturate(1.25); box-shadow: inset 0 0 60px rgba(0,0,0,.55), inset 0 0 20px rgba(180,100,20,.15); }

/* Crumpled notes */
.crumpled-note {
  position: absolute;
  background: #f5f0e0;
  border-radius: 3px;
  padding: 5px 6px;
  font-size: 0.52rem;
  color: #555;
  line-height: 1.3;
  max-width: 64px;
  overflow: hidden;
  box-shadow: 2px 2px 6px rgba(0,0,0,.4);
  transition: all 1s ease;
  z-index: 2;
}
.note-1 { width: 60px; height: 44px; bottom: 55px; left: 12px;
  transform: rotate(-18deg) translate(-4px,6px); }
.note-2 { width: 54px; height: 40px; bottom: 80px; left: 40px;
  transform: rotate(12deg) translate(6px,-4px); }
.note-3 { width: 58px; height: 38px; bottom: 48px; left: 55px;
  transform: rotate(-8deg) translate(-2px,8px); }

/* Smoothed / clipped (loops 1-3) */
.deca-scene[data-loops="1"] .note-1,
.deca-scene[data-loops="2"] .note-1,
.deca-scene[data-loops="3"] .note-1 { transform: rotate(-6deg) translate(0,0); border-radius: 2px; }
.deca-scene[data-loops="2"] .note-2,
.deca-scene[data-loops="3"] .note-2 { transform: rotate(3deg) translate(0,0); border-radius: 2px; }
.deca-scene[data-loops="3"] .note-3 { transform: rotate(-2deg) translate(0,0); border-radius: 2px; }

/* Hidden for loops 7+ (replaced by notebook) */
.deca-scene[data-loops="7"] .crumpled-note,
.deca-scene[data-loops="8"] .crumpled-note,
.deca-scene[data-loops="9"] .crumpled-note,
.deca-scene[data-loops="10"] .crumpled-note { opacity: 0; }

/* Brass clip */
.brass-clip {
  position: absolute; bottom: 88px; left: 16px;
  width: 30px; height: 16px;
  background: linear-gradient(135deg, #c8a020, #8b6010);
  border-radius: 2px;
  opacity: 0; transition: opacity .8s ease;
  z-index: 3;
  box-shadow: 0 1px 3px rgba(0,0,0,.5);
}
.deca-scene[data-loops="2"] .brass-clip,
.deca-scene[data-loops="3"] .brass-clip { opacity: 0.5; }
.deca-scene[data-loops="4"] .brass-clip,
.deca-scene[data-loops="5"] .brass-clip,
.deca-scene[data-loops="6"] .brass-clip { opacity: 1; }
.deca-scene[data-loops="7"] .brass-clip,
.deca-scene[data-loops="8"] .brass-clip,
.deca-scene[data-loops="9"] .brass-clip,
.deca-scene[data-loops="10"] .brass-clip { opacity: 0; }

/* Pens */
.desk-pen {
  position: absolute; width: 6px; border-radius: 3px;
  box-shadow: 1px 1px 4px rgba(0,0,0,.5);
  transition: all 1s ease; z-index: 2;
}
.pen-1 { height: 52px; bottom: 50px; right: 28px;
  background: linear-gradient(180deg,#2c2c4a,#1a1a30);
  transform: rotate(30deg); }
.pen-2 { height: 48px; bottom: 44px; right: 38px;
  background: linear-gradient(180deg,#3a1515,#221010);
  transform: rotate(-20deg); }
.deca-scene[data-loops="4"] .pen-1,
.deca-scene[data-loops="5"] .pen-1,
.deca-scene[data-loops="6"] .pen-1,
.deca-scene[data-loops="7"] .pen-1,
.deca-scene[data-loops="8"] .pen-1,
.deca-scene[data-loops="9"] .pen-1,
.deca-scene[data-loops="10"] .pen-1 { transform: rotate(0deg) translate(12px,-8px); bottom: 56px; }
.deca-scene[data-loops="5"] .pen-2,
.deca-scene[data-loops="6"] .pen-2,
.deca-scene[data-loops="7"] .pen-2,
.deca-scene[data-loops="8"] .pen-2,
.deca-scene[data-loops="9"] .pen-2,
.deca-scene[data-loops="10"] .pen-2 { transform: rotate(0deg) translate(8px,-4px); bottom: 56px; }

/* Pencil holder */
.pencil-holder {
  position: absolute; bottom: 46px; right: 18px;
  width: 22px; height: 30px;
  background: linear-gradient(180deg,#6b3a1a,#3d2010);
  border-radius: 3px 3px 0 0;
  border: 1px solid #8b5030;
  opacity: 0; transition: opacity .8s ease; z-index: 1;
}
.deca-scene[data-loops="4"] .pencil-holder,
.deca-scene[data-loops="5"] .pencil-holder,
.deca-scene[data-loops="6"] .pencil-holder,
.deca-scene[data-loops="7"] .pencil-holder,
.deca-scene[data-loops="8"] .pencil-holder,
.deca-scene[data-loops="9"] .pencil-holder,
.deca-scene[data-loops="10"] .pencil-holder { opacity: 1; }

/* Leather notebook */
.deca-notebook {
  position: absolute;
  bottom: 44px; left: 50%; transform: translateX(-50%) translateY(20px);
  width: 90px; height: 68px;
  background: linear-gradient(145deg,#5c2e10,#3d1a08);
  border-radius: 4px 6px 6px 4px;
  border: 1px solid #8b5030;
  box-shadow: 3px 3px 12px rgba(0,0,0,.6), inset 0 0 8px rgba(0,0,0,.3);
  opacity: 0; transition: all 1s ease; z-index: 4;
}
.deca-notebook-title {
  padding: 8px 6px 4px;
  font-size: 0.5rem; color: rgba(220,180,100,0.7);
  text-align: center; font-style: italic;
  line-height: 1.3; overflow: hidden;
  height: 52px;
}
.deca-notebook-spine {
  position: absolute; left: 0; top: 0; bottom: 0; width: 8px;
  background: linear-gradient(180deg,#8b5030,#5c3018);
  border-radius: 3px 0 0 3px;
  border-right: 1px solid rgba(255,255,255,0.05);
}
.deca-scene[data-loops="7"] .deca-notebook,
.deca-scene[data-loops="8"] .deca-notebook,
.deca-scene[data-loops="9"] .deca-notebook { opacity: 1; transform: translateX(-50%) translateY(0); }
.deca-scene[data-loops="10"] .deca-notebook { opacity: 0; transform: translateX(50%) translateY(-20px); transition: all .8s ease; }

/* Candle glow */
.deca-candle-glow {
  position: absolute; top: 0; left: 50%;
  width: 160px; height: 140px;
  transform: translateX(-50%);
  background: radial-gradient(ellipse at 50% 10%, rgba(251,191,36,0.35) 0%, rgba(234,120,20,0.15) 35%, transparent 70%);
  opacity: 0; transition: opacity 1.2s ease;
  pointer-events: none; z-index: 1;
}
.deca-candle {
  position: absolute; top: 12px; left: 50%;
  transform: translateX(-50%);
  font-size: 1.4rem;
  opacity: 0; transition: opacity 1s ease;
  z-index: 6;
  filter: drop-shadow(0 0 8px rgba(251,191,36,0.8));
}
.deca-scene[data-loops="10"] .deca-candle,
.deca-scene[data-loops="10"] .deca-candle-glow { opacity: 1; }
.deca-scene[data-loops="10"] {
  border-bottom: 2px solid rgba(251,191,36,0.3);
  box-shadow: 0 0 30px rgba(251,191,36,0.08);
}

/* Beads */
.deca-beads {
  position: absolute; bottom: 8px; left: 50%;
  transform: translateX(-50%);
  display: flex; gap: 7px; z-index: 10;
}
.deca-bead {
  width: 12px; height: 12px; border-radius: 50%;
  background: rgba(60,30,10,0.8);
  border: 1px solid #5c3318;
  transition: all .4s ease;
}
.deca-bead.filled {
  background: radial-gradient(circle at 35% 35%, #fde68a, #d97706);
  border-color: #f59e0b;
  box-shadow: 0 0 6px rgba(245,158,11,.6);
}

/* Bookshelf view */
.deca-shelf {
  padding: 10px 14px;
  background: #0d0500;
  min-height: 80px;
  display: flex;
  align-items: flex-end;
  gap: 3px;
  overflow-x: auto;
}
.shelf-book {
  border-radius: 2px 2px 0 0;
  flex-shrink: 0;
  width: 14px;
  min-height: 20px;
  cursor: pointer;
  position: relative;
  transition: transform .15s;
  border-left: 1px solid rgba(255,255,255,0.05);
}
.shelf-book:hover { transform: translateY(-3px); }
.shelf-book.complete { box-shadow: 0 0 6px rgba(245,158,11,.3); }
.shelf-book.incomplete { transform: rotate(1.5deg) skewX(0.5deg); }

/* Deca info bar */
.deca-info {
  display: flex; justify-content: space-between;
  padding: 7px 14px;
  font-size: 0.68rem; color: #9a7050;
  border-top: 1px solid rgba(92,51,24,.4);
}
.deca-info strong { color: #c4a070; }

/* Weekly retrospective tab */
.memo-tabs {
  display: flex; gap: 0; margin-bottom: 12px;
  border-bottom: 1px solid var(--border);
}
.memo-tab-btn {
  flex: 1; padding: 7px 4px; border: none; background: none;
  font-family: inherit; font-size: 0.78rem; color: var(--text-muted);
  cursor: pointer; border-bottom: 2px solid transparent;
  margin-bottom: -1px; transition: all .15s;
}
.memo-tab-btn.active {
  color: var(--accent-math); border-bottom-color: var(--accent-math);
  font-weight: 700;
}
.memo-pane { display: none; }
.memo-pane.active { display: block; }

/* Retro Vault */
.retro-vault-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
  z-index: 9999; display: flex; align-items: center; justify-content: center;
}
.retro-vault-modal {
  background: var(--bg-card);
  width: 90%; max-width: 500px; max-height: 80vh;
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow);
  display: flex; flex-direction: column;
  overflow: hidden;
  border: 1px solid var(--border-highlight);
}
.retro-vault-header {
  padding: 16px; border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
}
.retro-vault-header h3 { margin: 0; font-size: 1.1rem; color: #fff; }
.retro-vault-content {
  padding: 16px; overflow-y: auto; flex: 1;
}
.retro-vault-item {
  background: rgba(255,255,255,0.05);
  border-radius: var(--radius-md);
  padding: 12px; margin-bottom: 12px;
  border: 1px solid rgba(255,255,255,0.1);
}
.retro-vault-item-header {
  display: flex; justify-content: space-between; margin-bottom: 8px; align-items: center;
}
.retro-vault-type {
  font-size: 0.75rem; padding: 2px 6px; border-radius: 4px; font-weight: bold;
}
.retro-vault-type.daily { background: rgba(59,130,246,0.3); color: #93c5fd; }
.retro-vault-type.weekly { background: rgba(16,185,129,0.3); color: #6ee7b7; }
.retro-vault-date { font-size: 0.8rem; color: var(--text-muted); }
.retro-vault-text { font-size: 0.9rem; color: var(--text-secondary); line-height: 1.5; white-space: pre-wrap; }
.weekly-summary-mini {
  font-size: 0.72rem; color: var(--text-muted);
  background: var(--border-subtle); border-radius: 6px;
  padding: 6px 10px; margin-bottom: 8px;
}

/* ══════════════════════════════════════════
   RESPONSIVE
   ══════════════════════════════════════════ */
@media (max-width: 400px) {
  .hero { padding: 48px 18px 22px; }
  .dday-num { font-size: 2rem; }
  .container { padding: 0 12px 28px; }
}
@media (min-width: 520px) {
  .hero { border-radius: 0 0 32px 32px; }
}
@media (min-width: 1024px) {
  .container {
    max-width: 1200px;
    padding: 0 40px 48px;
  }
  .planner-layout {
    display: grid;
    grid-template-columns: 1.25fr 1fr;
    gap: 24px;
    align-items: start;
  }
  .planner-left, .planner-right {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .planner-left > *, .planner-right > * {
    margin-bottom: 0 !important;
  }
}

/* ══════════════════════════════════════════
   POMODORO & AUDIO WIDGET
   ══════════════════════════════════════════ */
.pomodoro-widget {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: rgba(20, 20, 40, 0.88);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 20px;
  padding: 10px 14px 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.45);
  z-index: 1000;
  transition: opacity 0.2s, box-shadow 0.2s;
  min-width: 160px;
  overflow: hidden;
  touch-action: none;
}
/* 접힌 상태: 타이머 + 버튼만 */
.pomodoro-widget.collapsed {
  padding-bottom: 10px;
}
.pomodoro-widget.collapsed .pomo-mode {
  display: none;
}
/* 접기 토글 버튼 */
.pomo-collapse-btn {
  position: absolute;
  top: 8px;
  right: 10px;
  background: none;
  border: none;
  color: rgba(255,255,255,0.4);
  font-size: 0.75rem;
  cursor: pointer;
  padding: 2px 4px;
  line-height: 1;
  transition: color 0.15s, transform 0.25s;
}
.pomo-collapse-btn:hover { color: rgba(255,255,255,0.85); }
.pomodoro-widget.collapsed .pomo-collapse-btn { transform: rotate(180deg); }
/* 새 창 버튼 (우상단 고정) */
.open-window-btn {
  position: fixed;
  top: 16px;
  right: 16px;
  z-index: 1001;
  width: 38px;
  height: 38px;
  border: 1px solid var(--border);
  border-radius: 50%;
  background: var(--bg-card);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1rem;
  box-shadow: var(--shadow-sm);
  transition: all var(--transition-fast);
  text-decoration: none;
  color: var(--text-primary);
}
.open-window-btn:hover { transform: scale(1.08); box-shadow: var(--shadow); }
.pomo-top-row {
  display: flex;
  align-items: center;
  gap: 10px;
}
.pomodoro-time {
  font-size: 1.5rem;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  color: #fff;
  width: 65px;
  text-align: center;
}
.pomodoro-controls {
  display: flex;

<script>
/* ══════════════════════════════════════════
   CONSTANTS
   ══════════════════════════════════════════ */
const FETCH  = 'mcp__17090896-bf5b-4f0f-ab05-b0f011fedc1d__notion-fetch';
const SEARCH = 'mcp__17090896-bf5b-4f0f-ab05-b0f011fedc1d__notion-search';
const UPDATE = 'mcp__17090896-bf5b-4f0f-ab05-b0f011fedc1d__notion-update-page';
const EXAM   = new Date('2027-01-05T00:00:00');
const PLANNER_ID = '37716b05-a4f9-81b5-8554-e89acef1739e';

/* ──────────────────────────────────────────
   URL 파라미터에서 날짜 읽기 (?date=YYYY-MM-DD)
   없으면 오늘 날짜 사용
   ────────────────────────────────────────── */
const _urlDate = (function() {
  const p = new URLSearchParams(location.search).get('date');
  if (p && /^\d{4}-\d{2}-\d{2}$/.test(p)) {
    const d = new Date(p + 'T00:00:00');
    if (!isNaN(d)) return d;
  }
  return null;
})();
// true면 특정 날짜 모드, false면 오늘 모드
const IS_DATE_MODE = !!_urlDate;

/* ══════════════════════════════════════════
   GLOBAL STATE
   ══════════════════════════════════════════ */
let checklistPageId = null;
let parsedData = null;
let celebrationFired = false;

/* ══════════════════════════════════════════
   UTILITY FUNCTIONS
   ══════════════════════════════════════════ */
function dday() {
  const t = new Date();
  t.setHours(0, 0, 0, 0);
  return Math.ceil((EXAM - t) / 86400000);
}

function _targetDate() { return _urlDate || new Date(); }

function todayFmt() {
  const d = _targetDate();
  const days = '일월화수목금토';
  return `${d.getFullYear()}년 ${d.getMonth() + 1}월 ${d.getDate()}일 ${days[d.getDay()]}요일`;
}

function todayKey() {
  const d = _targetDate();
  return `${d.getMonth() + 1}/${d.getDate()}`;
}

function todayISO() {
  const d = _targetDate();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function esc(s) {
  return String(s || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

/**
 * Bug #7 fix: Improved cleanMd that handles nested markdown and more escape sequences
 */
function cleanMd(s) {
  return String(s || '')
    // Bold + italic combined: ***text***
    .replace(/\*\*\*(.*?)\*\*\*/g, '$1')
    // Bold: **text**
    .replace(/\*\*(.*?)\*\*/g, '$1')
    // Italic: *text*  (but not inside words)
    .replace(/(?<!\w)\*([^*]+?)\*(?!\w)/g, '$1')
    // Strikethrough: ~~text~~
    .replace(/~~(.*?)~~/g, '$1')
    // Inline code: `text`
    .replace(/`([^`]*)`/g, '$1')
    // Headers: # ## ###
    .replace(/^#{1,6}\s*/gm, '')
    // Leading bullets indicator ✦
    .replace(/^✦\s*/gm, '')
    // Escaped characters: \~ \* \_ \` \[ \] \( \) \# \! \\ \- \. \> \|
    .replace(/\\([~*_`\[\]()#!\\\-.>|{}+])/g, '$1')
    // Links: [text](url) → text
    .replace(/\[([^\]]*)\]\([^)]*\)/g, '$1')
    // Images: ![alt](url) → alt
    .replace(/!\[([^\]]*)\]\([^)]*\)/g, '$1')
    // HTML tags
    .replace(/<[^>]+>/g, '')
    .trim();
}

function checkSVG() {
  return `<svg width="11" height="9" viewBox="0 0 11 9" fill="none">
    <path d="M1 4.5L4 7.5L10 1" stroke="#35235d" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
      style="stroke-dasharray:20;stroke-dashoffset:0"/>
  </svg>`;
}

function taskHTML(item, groupId, idx) {
  const id = `t-${groupId}-${idx}`;
  return `<div class="task ${item.checked ? 'done' : ''}" id="${id}" onclick="handleToggle('${groupId}',${idx})">
    <div class="cb ${item.checked ? 'on' : ''}">${item.checked ? checkSVG() : ''}</div>
    <span class="task-text">${esc(item.text)}</span>
  </div>`;
}

/* ══════════════════════════════════════════
   THEME
   ══════════════════════════════════════════ */
function initTheme() {
  const saved = localStorage.getItem('planner-theme');
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const theme = saved || (prefersDark ? 'dark' : 'light');
  setTheme(theme);
}

function setTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem('planner-theme', theme);
  const btn = document.getElementById('themeToggle');
  if (btn) btn.textContent = theme === 'dark' ? '☀️' : '🌙';
}

document.getElementById('themeToggle').addEventListener('click', () => {
  const current = document.documentElement.getAttribute('data-theme');
  setTheme(current === 'dark' ? 'light' : 'dark');
});

/* ══════════════════════════════════════════
   TOAST
   ══════════════════════════════════════════ */
let toastTimer = null;
let toastHideTimer = null;
function toast(msg, isErr = false) {
  const el = document.getElementById('toast');
  clearTimeout(toastTimer);
  clearTimeout(toastHideTimer);

  el.className = '';
  el.textContent = msg;

  // Force reflow to restart animation
  void el.offsetWidth;

  el.className = 'show' + (isErr ? ' err-toast' : '');
  toastTimer = setTimeout(() => {
    el.className = 'hide' + (isErr ? ' err-toast' : '');
    toastHideTimer = setTimeout(() => { el.className = ''; }, 300);
  }, 2200);
}

/* ══════════════════════════════════════════
   STANDALONE MODE — LOCAL SERVER API
   ══════════════════════════════════════════ */
const LOCAL_API = window.location.origin;

function getNotionToken() { return localStorage.getItem('notion_token') || ''; }
function setNotionToken(t) { localStorage.setItem('notion_token', t); }

function showTokenSetup() { document.getElementById('tokenSetup').style.display = 'flex'; }
function closeTokenSetup() { document.getElementById('tokenSetup').style.display = 'none'; }
function saveNotionToken() {
  const v = document.getElementById('tokenInput').value.trim();
  if (!v.startsWith('secret_') && !v.startsWith('ntn_')) {
    alert('Notion 토큰은 secret_ 또는 ntn_ 으로 시작해야 합니다.');
    return;
  }
  setNotionToken(v);
  // 서버 파일에도 저장 (URL이 바뀌어도 유지)
  fetch(`${LOCAL_API}/api/token`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({token: v})
  }).catch(() => {});
  closeTokenSetup();
  init();
}

// 페이지 로드 시 서버에서 토큰 자동 복원 (또는 localStorage → 서버 동기화)
async function restoreTokenFromServer() {
  try {
    const r = await fetch(`${LOCAL_API}/api/token`);
    const d = await r.json();
    if (d.token) {
      // 서버에 토큰 있음 → localStorage에 저장
      setNotionToken(d.token);
    } else if (getNotionToken()) {
      // localStorage에만 있음 → 서버에도 저장 (동기화)
      await fetch(`${LOCAL_API}/api/token`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({token: getNotionToken()})
      });
    }
  } catch {}
}

async function safeApiCall(toolName, params, retries = 2) {
  const token = getNotionToken();
  if (!token) { showTokenSetup(); throw new Error('Notion 토큰을 먼저 설정해주세요'); }
  const hdrs = { 'Content-Type': 'application/json', 'X-Notion-Token': token };
  for (let i = 0; i <= retries; i++) {
    try {
      let data;
      if (toolName.includes('notion-fetch')) {
        const id = params.id || params.pageId || params.page_id;
        const r = await fetch(`${LOCAL_API}/api/fetch?id=${id}`, { headers: hdrs });
        if (!r.ok) throw new Error(`서버오류 ${r.status}: ${await r.text()}`);
        data = await r.json();
        if (data.error) throw new Error(data.error);
      } else if (toolName.includes('notion-search')) {
        const r = await fetch(`${LOCAL_API}/api/search`, {
          method: 'POST', headers: hdrs,
          body: JSON.stringify({ query: params.query, page_size: params.page_size || 5 })
        });
        if (!r.ok) throw new Error(`서버오류 ${r.status}`);
        data = await r.json();
        if (data.error) throw new Error(data.error);
      } else if (toolName.includes('notion-update-page')) {
        const r = await fetch(`${LOCAL_API}/api/update`, {
          method: 'POST', headers: hdrs,
          body: JSON.stringify({ page_id: params.page_id, command: params.command, content_updates: params.content_updates })
        });
        if (!r.ok) throw new Error(`서버오류 ${r.status}`);
        data = await r.json();
        if (data.error) throw new Error(data.error);
      } else if (toolName === 'notion-append-retro') {
        const r = await fetch(`${LOCAL_API}/api/append_retro`, {
          method: 'POST', headers: hdrs,
          body: JSON.stringify(params)
        });
        if (!r.ok) throw new Error(`서버오류 ${r.status}`);
        data = await r.json();
        if (data.error) throw new Error(data.error);
      }
      return data;
    } catch (e) {
      if (i === retries) throw e;
      await new Promise(r => setTimeout(r, 800 * (i + 1)));
    }
  }
}

/* ══════════════════════════════════════════
   LOCALSTORAGE CACHING
   ══════════════════════════════════════════ */
function getCachedData() {
  try {
    const raw = localStorage.getItem('planner-daily-cache');
    if (!raw) return null;
    const data = JSON.parse(raw);
    // Only use cache from today
    const cacheDate = new Date(data.timestamp);
    const now = new Date();
    if (cacheDate.toDateString() !== now.toDateString()) return null;
    return data;
  } catch { return null; }
}

function setCachedData(checklistId, content) {
  try {
    localStorage.setItem('planner-daily-cache', JSON.stringify({
      timestamp: Date.now(),
      checklistPageId: checklistId,
      content: content
    }));
  } catch { /* quota exceeded or private mode */ }
}

/* ══════════════════════════════════════════
   STUDY STREAK
   ══════════════════════════════════════════ */
function getStreakData() {
  try {
    const raw = localStorage.getItem('planner-streak-data');
    return raw ? JSON.parse(raw) : { lastDate: null, streak: 0 };
  } catch { return { lastDate: null, streak: 0 }; }
}

function updateStreak(hasActivity) {
  const data = getStreakData();
  const today = todayISO();

  if (data.lastDate === today) {
    // Already recorded today
    return data.streak;
  }

  if (!hasActivity) return data.streak;

  // Check if yesterday was recorded
  const yesterday = new Date();
  yesterday.setDate(yesterday.getDate() - 1);
  const yISO = `${yesterday.getFullYear()}-${String(yesterday.getMonth()+1).padStart(2,'0')}-${String(yesterday.getDate()).padStart(2,'0')}`;

  let newStreak;
  if (data.lastDate === yISO) {
    newStreak = data.streak + 1;
  } else if (data.lastDate === today) {
    newStreak = data.streak;
  } else {
    newStreak = 1; // Reset
  }

  const newData = { lastDate: today, streak: newStreak };
  try {
    localStorage.setItem('planner-streak-data', JSON.stringify(newData));
  } catch {}
  return newStreak;
}

function renderStreak(streak) {
  const el = document.getElementById('streakBadge');
  if (!el) return;
  if (streak > 0) {
    el.innerHTML = `<div class="streak-badge"><span class="fire">🔥</span> ${streak}일 연속 학습 중</div>`;
  } else {

}

/* ══════════════════════════════════════════
   PARSER (Bug #2 fixed: flexible header matching)
   ══════════════════════════════════════════ */
function parsePage(content) {
  const key = todayKey(); // e.g. "6/26"
  const lines = content.split('\n');

  // Bug #2 Fix: flexible header detection
  // Match lines that contain the date pattern (e.g. 6/26) as a header-like line
  // Accepts: ### 6/26, ✦ 6/26, **6/26**, # 6/26(목), any header containing the date
  const datePattern = new RegExp(`(?:^[#✦*\\s]*.*)?${key.replace('/', '\\/')}(?:\\s|\\(|$|\\)|\\*|[가-힣])`);

  let start = -1;
  for (let i = 0; i < lines.length; i++) {
    const l = lines[i].trim();
    if (!l) continue;
    // Check: is it a header-like line containing today's date?
    const isHeader = l.startsWith('#') || l.startsWith('✦') || l.startsWith('**') || l.startsWith('> ');
    const containsDate = l.includes(key);
    if (containsDate && (isHeader || datePattern.test(l))) {
      start = i;
      break;
    }
  }
  if (start === -1) return null;

  let end = lines.length;
  for (let i = start + 1; i < lines.length; i++) {
    const l = lines[i].trim();
    if (l === '---') { end = i; break; }
    // Next day header (a header not containing today's key)
    if ((l.startsWith('### ') || l.startsWith('## ') || (l.startsWith('✦') && l.match(/\d+\/\d+/)))
        && !l.includes(key)) {
      end = i;
      break;
    }
  }

  const sectionLines = lines.slice(start, end);
  const header = sectionLines[0] || '';
  const stageM = header.match(/(\d)단계/);
  const dayM   = header.match(/Day\s*(\d+)/i);
  const loopM  = header.match(/(\d+)루프/);

  const result = {
    stage: stageM ? stageM[1] + '단계' : '',
    studyDay: dayM ? 'Day' + dayM[1] : '',
    totalLoops: loopM ? loopM[1] : '',
    routines: [],
    blocks: [],
    hasCarryover: false,
    sectionLines,      // keep for update
    sectionStart: start // absolute line index in full content
  };

  let inRoutine = false, curBlock = null, prevRawLine = '';

  for (let i = 1; i < sectionLines.length; i++) {
    const raw = sectionLines[i];
    const l = raw.trim();
    if (!l || l.startsWith('>')) { if (l) prevRawLine = raw; continue; }

    if (l.includes('비협상 루틴') || (l.startsWith('**') && l.includes('🔴'))) {
      inRoutine = true; curBlock = null; prevRawLine = raw; continue;
    }
    if ((l.includes('📦') || (l.includes('이월') && l.startsWith('**'))) && !l.match(/^- /)) {
      result.hasCarryover = true; inRoutine = false;
      curBlock = { title: cleanMd(l), subject: 'math', items: [] };
      result.blocks.push(curBlock); prevRawLine = raw; continue;
    }
    const isTimeBlock = (l.includes('오전') || l.includes('🌅') || l.includes('오후') || l.includes('☀️') || l.includes('저녁') || l.includes('🌙'));
    if (isTimeBlock && (l.startsWith('**') || l.startsWith('#'))) {
      inRoutine = false;
      const isEng = l.includes('저녁') || l.includes('🌙') || l.includes('영어');
      curBlock = { title: cleanMd(l), subject: isEng ? 'eng' : 'math', items: [] };
      result.blocks.push(curBlock); prevRawLine = raw; continue;
    }

    const cxM = l.match(/^- \[x\]\s+(.*)/i);
    const coM = l.match(/^- \[ \]\s+(.*)/);
    if (cxM || coM) {
      const item = {
        checked: !!cxM,
        text: cleanMd((cxM || coM)[1]),
        rawLine: raw,
        prevLine: prevRawLine,
        sectionIndex: i // index within sectionLines for Bug #3 fix
      };
      if (inRoutine) result.routines.push(item);
      else if (curBlock) curBlock.items.push(item);
    }
    if (l) prevRawLine = raw;
  }
  return result;
}

/* ══════════════════════════════════════════
   NOTION TOGGLE (Bug #3 fixed: sectionLines sync)
   ══════════════════════════════════════════ */
async function notionToggle(item) {
  const oldLine = item.rawLine;
  const newLine = item.checked
    ? oldLine.replace(/- \[x\]/i, '- [ ]')
    : oldLine.replace('- [ ]', '- [x]');

  if (oldLine === newLine) throw new Error('줄 변환 실패');

  // Use prevLine + currentLine for unique context
  const oldStr = item.prevLine ? item.prevLine + '\n' + oldLine : oldLine;
  const newStr = item.prevLine ? item.prevLine + '\n' + newLine : newLine;

  const res = await safeApiCall(UPDATE, {
    page_id: checklistPageId,
    command: 'update_content',
    content_updates: [{ old_str: oldStr, new_str: newStr }]
  });

  // Success: update item state
  item.checked = !item.checked;
  item.rawLine = newLine;

  // Bug #3 fix: sync sectionLines array
  if (parsedData && parsedData.sectionLines && typeof item.sectionIndex === 'number') {
    parsedData.sectionLines[item.sectionIndex] = newLine;
  }
}

function checkLoopCompletion() {
  if (!parsedData) return;
  let data = getDecaData();
  const today = todayISO();
  if (data.lastDate !== today) { data.dailyLoops = 0; data.lastDate = today; }
  let completed = 0;
  for (const block of parsedData.blocks) {
    if (block.items.length > 0 && block.items.every(i => i.checked)) completed++;
  }
  const prev = data.dailyLoops || 0;
  if (completed > prev) {
    const gained = completed - prev;
    data.dailyLoops = completed;
    data.totalLoops = (data.totalLoops || 0) + gained;
    data.agingLevel = Math.min(5, Math.floor((data.totalLoops || 0) / 20));
    if (!data.books) data.books = [];
    const todayBook = data.books.find(b => b.date === today);
    if (todayBook) { todayBook.loops = completed; } else { data.books.push({ date: today, loops: completed }); }
    saveDecaData(data);
    renderDecaGardia();
    toast(`📖 루프 ${completed} 완료! 탁상이 정돈됩니다`);
  }
}

   TIME CHIP
   ══════════════════════════════════════════ */
function getBlockTimeRange(block) {
  const title = block.title || '';
  const explicit = title.match(/(\d{1,2}):(\d{2})\s*[~\-~]–\s*(\d{1,2}):(\d{2})/);
  if (explicit) return { label: `${explicit[1]}:${explicit[2]} – ${explicit[3]}:${explicit[4]}`, start: parseInt(explicit[1]), end: parseInt(explicit[3]) };
  if (title.includes('오전') || title.includes('🌅')) return { label: '06:00 – 12:00', start: 6, end: 12 };
  if (title.includes('오후') || title.includes('☀️')) return { label: '13:00 – 18:00', start: 13, end: 18 };
  if (title.includes('저녁') || title.includes('🌙')) return { label: '19:00 – 23:00', start: 19, end: 23 };
  return null;
}

function isCurrentTimeBlock(tr) {
  if (!tr) return false;
  const h = new Date().getHours();
  return h >= tr.start && h < tr.end;
}

/* ══════════════════════════════════════════
   MEMO + WEEKLY RETROSPECTIVE
   ══════════════════════════════════════════ */
function getWeekKey() {
  const d = new Date();
  const jan1 = new Date(d.getFullYear(), 0, 1);
  const week = Math.ceil(((d - jan1) / 86400000 + jan1.getDay() + 1) / 7);
  return `planner-weekly-${d.getFullYear()}-W${String(week).padStart(2,'0')}`;
}

function calcWeeklyAvg() {
  const today = new Date();
  const monday = new Date(today);
  monday.setDate(today.getDate() - ((today.getDay() + 6) % 7));
  let total = 0, count = 0;
  for (let i = 0; i < 7; i++) {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    if (d > today) break;
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    try {
      const cached = localStorage.getItem('planner-daily-cache');
      if (cached) { const c = JSON.parse(cached); if (c.checklistPageId) { total += 0; } }
    } catch {}
    const streak = localStorage.getItem('planner-streak-data');
    if (streak) count++;
  }
  return count > 0 ? Math.round(total / count) : null;
}

  const dailyKey = `planner-memo-${todayISO()}`;
  const weeklyKey = getWeekKey();
  let dailySaved = '', weeklySaved = '';

  return `

window.handleToggle = async function(groupId, idx) {
  if (!parsedData || !checklistPageId) return;

  let item;
  if (groupId === 'routine') {
    item = parsedData.routines[idx];
  } else {
    const bi = parseInt(groupId.replace('block-', ''));
    item = parsedData.blocks[bi]?.items[idx];
  }
  if (!item) return;

  const taskEl = document.getElementById(`t-${groupId}-${idx}`);
  const cbEl   = taskEl?.querySelector('.cb');
  if (!taskEl) return;

  taskEl.classList.add('saving');
  if (cbEl) cbEl.classList.add('saving');

  try {
    await notionToggle(item);

    taskEl.classList.remove('saving');
    taskEl.classList.toggle('done', item.checked);
    if (cbEl) {
      cbEl.classList.remove('saving');
      cbEl.classList.toggle('on', item.checked);
      cbEl.innerHTML = item.checked ? checkSVG() : '';
      if (item.checked) {
        // Re-trigger bounce animation
        cbEl.style.animation = 'none';
        void cbEl.offsetWidth;
        cbEl.style.animation = '';
      }
    }
    updateProgress();
    updateSubCounts();
    toast(item.checked ? '✅ 완료 처리됨' : '↩️ 완료 취소됨');

  } catch (e) {
    taskEl.classList.remove('saving');
    if (cbEl) cbEl.classList.remove('saving');
    toast('⚠️ 저장 실패: ' + (e.message || '').slice(0, 40), true);
  }
};

function updateSubCounts() {
  if (!parsedData) return;
  const rDone = parsedData.routines.filter(i => i.checked).length;
  const rSub = document.getElementById('sub-routine');
  if (rSub) rSub.textContent = `${rDone}/${parsedData.routines.length}`;
  parsedData.blocks.forEach((b, bi) => {
    const bd = b.items.filter(i => i.checked).length;
    const el = document.getElementById(`sub-block-${bi}`);
    if (el) el.textContent = `${bd}/${b.items.length}`;
  });
}

function updateProgress() {
  if (!parsedData) return;
  const all  = [...parsedData.routines, ...parsedData.blocks.flatMap(b => b.items)];
  const done = all.filter(i => i.checked).length;
  const total = all.length;
  const pct  = total ? Math.round(done / total * 100) : 0;
  const lbl = document.getElementById('prog-label');
  const fill = document.getElementById('prog-fill');
  if (lbl) lbl.textContent = `${done}/${total} 완료 · ${pct}%`;
  if (fill) {
    fill.style.width = `${pct}%`;
    fill.classList.toggle('complete', pct === 100);
  }
  if (pct === 100 && !celebrationFired) {
    celebrationFired = true;
    setTimeout(triggerCelebration, 800);
  }
  if (typeof checkLoopCompletion === 'function') checkLoopCompletion();
}

function togglePomoCollapse() {

function initPomoDrag() {
  const widget = document.getElementById('pomoWidget');
  const handle = document.getElementById('pomoDragHandle');
  if (!widget || !handle) return;

  // Restore saved position
  const saved = JSON.parse(localStorage.getItem('pomo-pos') || 'null');
  if (saved) {
    widget.style.right = 'auto';
    widget.style.bottom = 'auto';
    widget.style.left = saved.left + 'px';
    widget.style.top  = saved.top  + 'px';
  }

  let dragging = false, ox = 0, oy = 0;

  function startDrag(cx, cy) {
    dragging = true;
    const r = widget.getBoundingClientRect();
    ox = cx - r.left;
    oy = cy - r.top;
    widget.classList.add('dragging');
    widget.style.right = 'auto';
    widget.style.bottom = 'auto';
    widget.style.transition = 'none';
  }
  function moveDrag(cx, cy) {
    if (!dragging) return;
    let left = cx - ox;
    let top  = cy - oy;
    // Clamp to viewport
    left = Math.max(0, Math.min(window.innerWidth  - widget.offsetWidth,  left));
    top  = Math.max(0, Math.min(window.innerHeight - widget.offsetHeight, top));
    widget.style.left = left + 'px';
    widget.style.top  = top  + 'px';
  }
  function endDrag() {
    if (!dragging) return;
    dragging = false;
    widget.classList.remove('dragging');
    localStorage.setItem('pomo-pos', JSON.stringify({
      left: parseFloat(widget.style.left),
      top:  parseFloat(widget.style.top)
    }));
  }

  // Mouse
  handle.addEventListener('mousedown',  e => { e.preventDefault(); startDrag(e.clientX, e.clientY); });
  document.addEventListener('mousemove', e => moveDrag(e.clientX, e.clientY));
  document.addEventListener('mouseup',   endDrag);

  // Touch
  handle.addEventListener('touchstart',  e => { e.preventDefault(); startDrag(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
  document.addEventListener('touchmove',  e => { if (dragging) { e.preventDefault(); moveDrag(e.touches[0].clientX, e.touches[0].clientY); } }, { passive: false });
  document.addEventListener('touchend',   endDrag);
}

/* ══════════════════════════════════════════
   POMODORO TIMER
   ══════════════════════════════════════════ */
let loopMinutes = parseInt(localStorage.getItem('loop-minutes') || '50');
let pomoTimer = null;
let pomoTimeLeft = loopMinutes * 60;
let isPomoRunning = false;
let isFocusMode = true; // true = focus, false = rest

function setLoopMode(min) {
  loopMinutes = min;
  localStorage.setItem('loop-minutes', String(min));
  const btn25 = document.getElementById('mode25');
  const btn50 = document.getElementById('mode50');
  if (btn25) btn25.classList.toggle('active', min === 25);
  if (btn50) btn50.classList.toggle('active', min === 50);
  // 현재 멈춤 상태일 때만 시간 재설정
  if (!isPomoRunning && isFocusMode) {
    pomoTimeLeft = min * 60;
    updatePomoDisplay();
  }
}

function updatePomoDisplay() {
  const m = Math.floor(pomoTimeLeft / 60);
  const s = pomoTimeLeft % 60;
  const timeEl = document.getElementById('pomoTime');
  if(timeEl) timeEl.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function togglePomodoro() {
  const btn = document.getElementById('pomoToggleBtn');
  if (isPomoRunning) {
    clearInterval(pomoTimer);
    isPomoRunning = false;
    if(btn) btn.textContent = '▶';
  } else {
    isPomoRunning = true;
    if(btn) btn.textContent = '⏸';
    pomoTimer = setInterval(() => {
      pomoTimeLeft--;
      if (pomoTimeLeft <= 0) {
        // Switch modes
        isFocusMode = !isFocusMode;
        pomoTimeLeft = isFocusMode ? loopMinutes * 60 : 10 * 60;
        const modeEl = document.getElementById('pomoMode');
        if(modeEl) {
          modeEl.textContent = isFocusMode ? 'FOCUS' : 'REST';
          modeEl.style.color = isFocusMode ? 'var(--text-muted)' : 'var(--accent-eng)';
        }
        // Play bell
        try {
          const actx = new (window.AudioContext || window.webkitAudioContext)();
          const osc = actx.createOscillator();
          osc.type = 'sine';
          osc.frequency.setValueAtTime(800, actx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(300, actx.currentTime + 1.5);
          const gain = actx.createGain();
          gain.gain.setValueAtTime(0.5, actx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, actx.currentTime + 1.5);
          osc.connect(gain); gain.connect(actx.destination);
          osc.start(); osc.stop(actx.currentTime + 1.5);
        } catch(e) {}
      }
      updatePomoDisplay();
    }, 1000);
  }
}

function resetPomodoro() {
  clearInterval(pomoTimer);
  isPomoRunning = false;
  isFocusMode = true;
  pomoTimeLeft = loopMinutes * 60;
  const btn = document.getElementById('pomoToggleBtn');
  if(btn) btn.textContent = '▶';
  const modeEl = document.getElementById('pomoMode');
  if(modeEl) {
    modeEl.textContent = 'FOCUS';
    modeEl.style.color = 'var(--text-muted)';
  }
  updatePomoDisplay();
}

/* ══════════════════════════════════════════
   WEB AUDIO API - MULTI-NOISE ENGINE
   ══════════════════════════════════════════ */
let audioCtx = null;
let noiseNode = null;
let masterGain = null;
let currentNoiseType = 'off';

function getOrCreateCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.5;
    masterGain.connect(audioCtx.destination);
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function stopNoise() {
  if (noiseNode) { try { noiseNode.stop(); noiseNode.disconnect(); } catch(e){} noiseNode = null; }
}

function makeNoiseBuffer(type) {
  const ctx = getOrCreateCtx();
  const sr = ctx.sampleRate;
  const buf = ctx.createBuffer(1, sr * 4, sr);
  const d = buf.getChannelData(0);
  if (type === 'white') {
    for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
  } else if (type === 'pink') {
    let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
    for (let i = 0; i < d.length; i++) {
      const w = Math.random() * 2 - 1;
      b0 = 0.99886*b0 + w*0.0555179; b1 = 0.99332*b1 + w*0.0750759;
      b2 = 0.96900*b2 + w*0.1538520; b3 = 0.86650*b3 + w*0.3104856;
      b4 = 0.55000*b4 + w*0.5329522; b5 = -0.7616*b5 - w*0.0168980;
      d[i] = (b0+b1+b2+b3+b4+b5+b6+w*0.5362) * 0.11;
      b6 = w * 0.115926;
    }
  } else if (type === 'rain') {
    // Brown noise with mild lowpass
    let last = 0;
    for (let i = 0; i < d.length; i++) {
      const w = Math.random() * 2 - 1;
      d[i] = (last + 0.02*w) / 1.02;
      last = d[i];
      d[i] *= 3.5;
    }
  } else if (type === 'ocean') {
    // Low-frequency undulation (waves)
    let last = 0;
    for (let i = 0; i < d.length; i++) {
      const w = Math.random() * 2 - 1;
      d[i] = (last + 0.005*w) / 1.005;
      last = d[i];
      d[i] *= 6.0;
    }
  }
  return buf;
}

function changeNoiseType(type) {
  // Update chip UI
  ['off','rain','white','pink','ocean'].forEach(t => {
    const el = document.getElementById('nc-' + t);
    if (el) el.classList.toggle('active', t === type);
  });
  currentNoiseType = type;

  stopNoise();
  if (type === 'off') return;

  const ctx = getOrCreateCtx();
  const buf = makeNoiseBuffer(type);
  noiseNode = ctx.createBufferSource();
  noiseNode.buffer = buf;
  noiseNode.loop = true;

  // Type-specific filter chain
  if (type === 'rain') {
    const f = ctx.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = 1100;
    noiseNode.connect(f); f.connect(masterGain);
  } else if (type === 'ocean') {
    const f = ctx.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = 350;
    noiseNode.connect(f); f.connect(masterGain);
  } else if (type === 'pink') {
    const f = ctx.createBiquadFilter(); f.type = 'highshelf'; f.frequency.value = 6000; f.gain.value = -4;
    noiseNode.connect(f); f.connect(masterGain);
  } else {
    noiseNode.connect(masterGain);
  }
  noiseNode.start(0);
}

function changeVolume(val) {
  if (masterGain) masterGain.gain.value = val / 100;
}

// Legacy alias (if anything still calls it)
function toggleRainNoise() { changeNoiseType(currentNoiseType === 'off' ? 'rain' : 'off'); }

  const key = localStorage.getItem('anthropic_api_key');
  if(input && key) input.value = key;
}

function closeAiModal() {
  const modal = document.getElementById('aiModal');
  if(modal) modal.style.display = 'none';
}

function saveApiKey() {
  const input = document.getElementById('apiKeyInput');
  if(input && input.value.trim()) {
    localStorage.setItem('anthropic_api_key', input.value.trim());
    toast('✅ API 키가 저장되었습니다.');
    closeAiModal();
  }
}

function openRetroVault() {
  let html = `<div class="retro-vault-overlay" id="retroVaultOverlay" onclick="closeRetroVault(event)">
    <div class="retro-vault-modal" onclick="event.stopPropagation()">
      <div class="retro-vault-header">
        <h3>🗂️ 내 회고록 모아보기</h3>
        <button onclick="closeRetroVault()" style="background:none; border:none; color:#fff; font-size:1.5rem; cursor:pointer; line-height:1;">&times;</button>
      </div>
      <div class="retro-vault-content">`;
      
  const items = [];
  for(let i=0; i<localStorage.length; i++) {
    const key = localStorage.key(i);
    if(key.startsWith('planner-memo-') || key.startsWith('planner-weekly-')) {
      const content = localStorage.getItem(key);
      if(content.trim().length > 0) {
        items.push({
          key: key,
          content: content,
          type: key.includes('weekly') ? '주간 회고' : '하루 회고',
          date: key.replace('planner-memo-', '').replace('planner-weekly-', '')
        });
      }
    }
  }
  
  items.sort((a,b) => b.date.localeCompare(a.date));
  
  if(items.length === 0) {
    html += `<div style="padding:20px; text-align:center; color:var(--text-muted);">저장된 회고록이 없습니다.</div>`;
  } else {
    items.forEach(it => {
      html += `<div class="retro-vault-item">
        <div class="retro-vault-item-header">
          <span class="retro-vault-type ${it.type==='주간 회고'?'weekly':'daily'}">${it.type}</span>
          <span class="retro-vault-date">${it.date}</span>
        </div>
        <div class="retro-vault-text">${esc(it.content).replace(/\n/g, '<br>')}</div>
      </div>`;
    });
  }
  
  html += `</div></div></div>`;
  document.body.insertAdjacentHTML('beforeend', html);
}

function closeRetroVault(e) {
  const el = document.getElementById('retroVaultOverlay');
  if(el) el.remove();
}

async function saveRetroToNotion() {
  const saveBtn = document.getElementById('saveRetroBtn');
  if(saveBtn) { saveBtn.disabled = true; saveBtn.innerHTML = '<span>⏳ 저장 중...</span>'; }
  try {
    const weeklyMemo = document.getElementById('memoAreaWeekly')?.value || '';
    const dailyMemo = document.getElementById('memoAreaDaily')?.value || '';
    const aiRetro = window.lastAiRetro || '';
    if (!checklistPageId) throw new Error("체크리스트 페이지 ID를 찾을 수 없습니다.");
    
    await safeApiCall('notion-append-retro', {
      page_id: checklistPageId,
      daily_memo: dailyMemo,
      weekly_memo: weeklyMemo,
      ai_retro: aiRetro
    }, 0);
    
    toast('✅ 노션에 회고록이 성공적으로 저장되었습니다!');
    if(saveBtn) { saveBtn.innerHTML = '<span>✅ 저장 완료</span>'; }
  } catch(e) {
    toast('❌ 저장 실패: ' + e.message, true);
    if(saveBtn) { saveBtn.disabled = false; saveBtn.innerHTML = '<span>💾 다시 시도하기</span>'; }
  }
}

async function analyzeWeeklyRetro() {
  const apiKey = localStorage.getItem('anthropic_api_key');
  if(!apiKey) {
    openAiModal();
    toast('⚠️ Anthropic API 키를 먼저 설정해주세요.', true);
    return;
  }

  const btn = document.getElementById('aiAnalyzeBtn');
  const box = document.getElementById('aiResultBox');
  const weeklyMemo = document.getElementById('memoAreaWeekly')?.value || '';
  const dailyMemo = document.getElementById('memoAreaDaily')?.value || '';
  
  if(!weeklyMemo && !dailyMemo) {
    toast('⚠️ 분석할 회고록 내용이 부족합니다.', true);
    return;
  }

  if(btn) { btn.disabled = true; btn.innerHTML = '<span>⏳ AI가 분석 중입니다...</span>'; }
  if(box) { box.style.display = 'block'; box.innerHTML = '<span style="color:var(--text-muted)">응답을 기다리는 중...</span>'; }

  const prompt = `당신은 시험(수학, 영어)을 준비하는 학생의 페이스메이커이자 멘토입니다.
학생이 작성한 이번 주 회고록과 오늘 회고록을 읽고, 따뜻하면서도 뼈있는 조언을 3~4문장으로 간결하게 작성해주세요.
응원, 과목 밸런스 점검, 멘탈 케어 요소를 포함해주세요.

[오늘의 회고]
${dailyMemo}

[이번 주 회고]
${weeklyMemo}`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 400,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    if(!response.ok) {
      const errText = await response.text();
      try {
        const errJson = JSON.parse(errText);
        throw new Error(errJson.error?.message || JSON.stringify(errJson));
      } catch(e) {
        throw new Error(errText);
      }
    }

    const data = await response.json();
    const resultText = data.content[0].text;
    
    // Typewriter effect
    if(box) {
      box.innerHTML = '';
      let i = 0;
      const typeInterval = setInterval(() => {
        box.innerHTML += resultText.charAt(i);
        i++;
        if(i >= resultText.length) {
          clearInterval(typeInterval);
          if(btn) { btn.disabled = false; btn.innerHTML = '<span>✨ 분석 완료 (다시하기)</span>'; }
          const saveWrap = document.getElementById('saveRetroWrap');
          if(saveWrap) saveWrap.style.display = 'block';
          window.lastAiRetro = resultText;
        }
      }, 30);
    }
  } catch(e) {
    if(box) box.innerHTML = `<span style="color:var(--accent-math)">에러 발생: ${e.message}</span>`;
    if(btn) { btn.disabled = false; btn.innerHTML = '<span>✨ 다시 시도하기</span>'; }
  }
}

/* ══════════════════════════════════════════
   MAIN INITIALIZATION
   ══════════════════════════════════════════ */
async function init() {
  const app = document.getElementById('app');

  // Initialize hero immediately
  document.getElementById('heroDate').textContent = todayFmt();
  const ddayVal = dday();
  document.getElementById('ddayNum').textContent = 'D-' + ddayVal;
  // Animate D-day ring (total study period ~550 days from 2025-07-01)
  const totalDays = 550;
  const circumference = 263.9;
  const ratio = Math.min(1, Math.max(0, (totalDays - ddayVal) / totalDays));
  const offset = circumference * (1 - ratio);
  setTimeout(() => {
    const ring = document.getElementById('ddayRingFill');
    if (ring) ring.style.strokeDashoffset = offset;
  }, 300);

  // Load streak from storage
  const streakData = getStreakData();
  renderStreak(streakData.streak);

  // Try cache first for instant render
  const cached = getCachedData();
  if (cached && cached.content) {
    try {
      checklistPageId = cached.checklistPageId;
      const parsed = parsePage(cached.content);
      if (parsed) {
        renderApp(parsed);
        // Continue to fetch fresh data in background
      }
    } catch { /* cache parse failed, will load fresh */ }
  }

  // Fetch from Notion
  try {
    // 1. Planner main → extract checklist subpage matching TODAY's date range
    const planRes  = await safeApiCall(FETCH, { id: PLANNER_ID });
    const planData = planRes;
    const planText = planData.text || '';

    const subMatches = [...planText.matchAll(/<page url="([^"]+)">([^<]*체크리스트[^<]*)<\/page>/g)];
    const now = _targetDate();
    const todayNum = (now.getMonth() + 1) * 100 + now.getDate();

    const candidates = subMatches.map(m => {
      const url = m[1], title = m[2];
      const rangeM = title.match(/(\d{1,2})\s*\/\s*(\d{1,2})\s*[~～]\s*(\d{1,2})\s*\/\s*(\d{1,2})/);
      const idM = url.match(/\/p\/([a-f0-9]+)/i);
      if (!idM) return null;
      let startNum = null, endNum = null;
      if (rangeM) {
        startNum = parseInt(rangeM[1]) * 100 + parseInt(rangeM[2]);
        endNum   = parseInt(rangeM[3]) * 100 + parseInt(rangeM[4]);
      }
      return { id: idM[1], title, startNum, endNum };
    }).filter(Boolean);

    // Prefer the page whose date range contains today
    let match = candidates.find(c => c.startNum !== null && todayNum >= c.startNum && todayNum <= c.endNum);
    // Otherwise, the closest upcoming week (smallest startNum >= today)
    if (!match) {
      const upcoming = candidates.filter(c => c.startNum !== null && c.startNum >= todayNum).sort((a,b) => a.startNum - b.startNum);
      match = upcoming[0];
    }
    // Otherwise, the most recent past week (largest endNum <= today)
    if (!match) {
      const past = candidates.filter(c => c.endNum !== null && c.endNum <= todayNum).sort((a,b) => b.endNum - a.endNum);
      match = past[0];
    }
    // Last resort: fall back to the last linked page (old behavior)
    if (!match && candidates.length > 0) match = candidates[candidates.length - 1];

    if (match) checklistPageId = match.id;

    // 2. Search fallback
    if (!checklistPageId) {
      const sr = await safeApiCall(SEARCH, { query: '일별 체크리스트', page_size: 5 });
      const sd = sr;
      const pages = (sd.results || [])
        .filter(r => r.type === 'page' && r.title?.includes('체크리스트'))
        .sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
      if (pages.length) checklistPageId = pages[0].id;
    }

    if (!checklistPageId) {
      app.innerHTML = '<div class="state err">체크리스트 페이지를 찾을 수 없습니다<small>Notion에 체크리스트 페이지가 있는지 확인해주세요</small></div>';
      return;
    }

    // 3. Fetch checklist page
    const fr = await safeApiCall(FETCH, { id: checklistPageId });
    const fd = fr;
    const raw = fd.text || '';

    // 4. Extract <content>
    const cm = raw.match(/<content>([\s\S]*?)<\/content>/);
    const content = cm ? cm[1] : raw;

    // 5. Cache the content
    setCachedData(checklistPageId, content);

    // 6. Parse & render
    const parsed = parsePage(content);
    if (!parsed) {
      app.innerHTML = `<div class="state err">오늘(${todayKey()}) 섹션 없음<small>Notion에 오늘 날짜 섹션을 추가하거나\n새 주차 체크리스트가 필요합니다.</small></div>`;
      return;
    }
    renderApp(parsed);

  } catch (e) {
    const errMsg = e.message || String(e);
    if (parsedData) {
      // 캐시 데이터는 있지만 최신 동기화 실패 — 에러 내용 + 재시도 버튼 표시
      const syncErr = document.getElementById('sync-err-banner');
      if (syncErr) {
        syncErr.innerHTML = `⚠️ 동기화 실패: <em>${esc(errMsg.slice(0, 80))}</em> &nbsp;<button onclick="document.getElementById('sync-err-banner').remove();init()" style="font-size:.72rem;padding:2px 8px;border:1px solid rgba(255,255,255,.3);border-radius:6px;background:none;color:inherit;cursor:pointer">재시도</button>`;
        syncErr.style.display = 'block';
      } else {
        toast('⚠️ 동기화 실패: ' + errMsg.slice(0, 60), true);
      }
    } else {
      app.innerHTML = `<div class="state err">오류 발생<small>${esc(errMsg)}</small></div>`;
    }
  }
}

// Initialize theme first, then app
initTheme();

// 날짜 모드 (월별에서 넘어온 경우) → 뒤로 버튼 표시
if (IS_DATE_MODE) {
  const backBtn = document.getElementById('backToMonthly');
  if (backBtn) backBtn.style.display = 'block';
}

// 서버에서 토큰 복원 후 init 실행
restoreTokenFromServer().then(() => {
  if (!getNotionToken()) {
    // 토큰 없음 → 설정 모달 표시
    showTokenSetup();
  } else {
    closeTokenSetup();
    init();
  }
});
