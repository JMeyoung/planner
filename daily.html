async function notionToggle(item) {
  const oldLine = item.rawLine;
  const newLine = item.checked
    ? oldLine.replace(/- \[x\]/i, '- [ ]')
    : oldLine.replace('- [ ]', '- [x]');

  if (oldLine === newLine) throw new Error('줄 변환 실패');

  // Use prevLine + currentLine for unique context
  const oldStr = item.prevLine ? item.prevLine + '\n' + oldLine : oldLine;
  const newStr = item.prevLine ? item.prevLine + '\n' + newLine : newLine;

  const res = await safeApiCall(UPDATE, {
    page_id: checklistPageId,
    command: 'update_content',
    content_updates: [{ old_str: oldStr, new_str: newStr }]
  });

  // Success: update item state
  item.checked = !item.checked;
  item.rawLine = newLine;

  
  if (parsedData && parsedData.sectionLines && typeof item.sectionIndex === 'number') {
    parsedData.sectionLines[item.sectionIndex] = newLine;
  }
}

function checkLoopCompletion() {
  if (!parsedData) return;
  let data = getDecaData();
  const today = todayISO();
  if (data.lastDate !== today) { data.dailyLoops = 0; data.lastDate = today; }
  let completed = 0;
  for (const block of parsedData.blocks) {
    if (block.items.length > 0 && block.items.every(i => i.checked)) completed++;
  }
  const prev = data.dailyLoops || 0;
  if (completed > prev) {
    const gained = completed - prev;
    data.dailyLoops = completed;
    data.totalLoops = (data.totalLoops || 0) + gained;
    data.agingLevel = Math.min(5, Math.floor((data.totalLoops || 0) / 20));
    if (!data.books) data.books = [];
    const todayBook = data.books.find(b => b.date === today);
    if (todayBook) { todayBook.loops = completed; } else { data.books.push({ date: today, loops: completed }); }
    saveDecaData(data);
    renderDecaGardia();
    toast(`📖 루프 ${completed} 완료! 탁상이 정돈됩니다`);
  }
}

function getBlockTimeRange(block) {
  const title = block.title || '';
  const explicit = title.match(/(\d{1,2}):(\d{2})\s*[~\-~]–\s*(\d{1,2}):(\d{2})/);
  if (explicit) return { label: `${explicit[1]}:${explicit[2]} – ${explicit[3]}:${explicit[4]}`, start: parseInt(explicit[1]), end: parseInt(explicit[3]) };
  if (title.includes('오전') || title.includes('🌅')) return { label: '06:00 – 12:00', start: 6, end: 12 };
  if (title.includes('오후') || title.includes('☀️')) return { label: '13:00 – 18:00', start: 13, end: 18 };
  if (title.includes('저녁') || title.includes('🌙')) return { label: '19:00 – 23:00', start: 19, end: 23 };
  return null;
}

function isCurrentTimeBlock(tr) {
  if (!tr) return false;
  const h = new Date().getHours();
  return h >= tr.start && h < tr.end;
}

window.submitQuickAdd = async function(blockId) {
  const input = document.getElementById('qa-input-' + blockId);
  if (!input || !input.value.trim()) return;
  const text = input.value.trim();
  const newLine = `- [ ] ${text}`;
  let bi = null;
  if (blockId.startsWith('block-')) bi = parseInt(blockId.replace('block-', ''));
  const block = bi !== null ? parsedData?.blocks[bi] : null;
  const lastItem = block?.items[block.items.length - 1];
  try {
    if (!checklistPageId) throw new Error('페이지 ID 없음');
    const anchorLine = lastItem ? lastItem.rawLine : (block ? cleanMd(block.title) : '');
    if (!anchorLine) throw new Error('참조라인 없음');
    await safeApiCall(UPDATE, {
      page_id: checklistPageId,
      command: 'update_content',
      content_updates: [{ old_str: anchorLine, new_str: anchorLine + '\n' + newLine }]
    });
    if (block) {
      const newItem = { checked: false, text, rawLine: newLine, prevLine: anchorLine, sectionIndex: -1 };
      block.items.push(newItem);
      const qaDiv = document.getElementById('qa-' + blockId);
      if (qaDiv) {
        const taskHtmlStr = taskHTML(newItem, blockId, block.items.length - 1);
        const tmp = document.createElement('div');
        tmp.innerHTML = taskHtmlStr;
        qaDiv.parentElement.insertBefore(tmp.firstChild, qaDiv);

    }
    window.closeQuickAdd(blockId);
    updateProgress();
    updateSubCounts();
    toast('✅ 항목이 추가되었습니다');
  } catch(e) {
    toast('⚠️ 추가 실패: ' + (e.message||'').slice(0,40), true);

};

function getWeekKey() {
  const d = new Date();
  const jan1 = new Date(d.getFullYear(), 0, 1);
  const week = Math.ceil(((d - jan1) / 86400000 + jan1.getDay() + 1) / 7);
  return `planner-weekly-${d.getFullYear()}-W${String(week).padStart(2,'0')}`;
}

function calcWeeklyAvg() {
  const today = new Date();
  const monday = new Date(today);
  monday.setDate(today.getDate() - ((today.getDay() + 6) % 7));
  let total = 0, count = 0;
  for (let i = 0; i < 7; i++) {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    if (d > today) break;
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    try {
      const cached = localStorage.getItem('planner-daily-cache');
      if (cached) { const c = JSON.parse(cached); if (c.checklistPageId) { total += 0; } }
    } catch {}
    const streak = localStorage.getItem('planner-streak-data');
    if (streak) count++;
  }
  return count > 0 ? Math.round(total / count) : null;
}

  }

    const cls  = b.subject === 'eng' ? 'eng' : 'math';
    const icon = b.subject === 'eng' ? '📘' : '📐';
    const bd   = b.items.filter(i => i.checked).length;
    const tr   = getBlockTimeRange(b);
    const isActive = isCurrentTimeBlock(tr);
    const activeClass = isActive ? ` active-block${b.subject==='eng'?' eng-block':''}` : '';
    const timeChipHtml = tr ? `<span class="time-chip ${b.subject==='eng'?'eng-chip':'math-chip'}">${tr.label}</span>` : '';
    return `
      <div class="card${activeClass}">
        <div class="card-header">

          <span class="card-title ${cls}">${esc(b.title)}</span>

        </div>
        ${b.items.map((it, ii) => taskHTML(it, `block-${bi}`, ii)).join('')}

  }).join('');

  leftCol += blockCards || '<div class="card"><div class="state" style="padding:16px">블록 데이터 없음</div></div>';

  // University + Deca + Memo + Pomo
  rightCol += renderUnivCard();

  const html = `

    <div class="planner-layout">

  document.getElementById('app').innerHTML = html;

  // Post-render init
  initMemo();
  renderDecaGardia();
  initHeroBanner();
  // Init draggable pomodoro
  initPomoDrag();
  // Init loop mode buttons
  setLoopMode(loopMinutes);

  // Trigger celebration if already 100%
  if (pct === 100 && !celebrationFired) {
    celebrationFired = true;
    setTimeout(triggerCelebration, 800);
  }
}

   CLICK HANDLER
   ══════════════════════════════════════════ */
window.handleToggle = async function(groupId, idx) {
  if (!parsedData || !checklistPageId) return;

  let item;
  if (groupId === 'routine') {
    item = parsedData.routines[idx];
  } else {
    const bi = parseInt(groupId.replace('block-', ''));
    item = parsedData.blocks[bi]?.items[idx];
  }
  if (!item) return;

  const taskEl = document.getElementById(`t-${groupId}-${idx}`);
  const cbEl   = taskEl?.querySelector('.cb');
  if (!taskEl) return;

  taskEl.classList.add('saving');
  if (cbEl) cbEl.classList.add('saving');

  try {
    await notionToggle(item);

    taskEl.classList.remove('saving');
    taskEl.classList.toggle('done', item.checked);
    if (cbEl) {
      cbEl.classList.remove('saving');
      cbEl.classList.toggle('on', item.checked);
      cbEl.innerHTML = item.checked ? checkSVG() : '';
      if (item.checked) {
        // Re-trigger bounce animation
        cbEl.style.animation = 'none';
        void cbEl.offsetWidth;
        cbEl.style.animation = '';
      }
    }
    updateProgress();
    updateSubCounts();
    toast(item.checked ? '✅ 완료 처리됨' : '↩️ 완료 취소됨');

  } catch (e) {
    taskEl.classList.remove('saving');
    if (cbEl) cbEl.classList.remove('saving');
    toast('⚠️ 저장 실패: ' + (e.message || '').slice(0, 40), true);
  }
};

function updateSubCounts() {
  if (!parsedData) return;
  const rDone = parsedData.routines.filter(i => i.checked).length;
  const rSub = document.getElementById('sub-routine');
  if (rSub) rSub.textContent = `${rDone}/${parsedData.routines.length}`;
  parsedData.blocks.forEach((b, bi) => {
    const bd = b.items.filter(i => i.checked).length;
    const el = document.getElementById(`sub-block-${bi}`);
    if (el) el.textContent = `${bd}/${b.items.length}`;
  });
}

function updateProgress() {
  if (!parsedData) return;
  const all  = [...parsedData.routines, ...parsedData.blocks.flatMap(b => b.items)];
  const done = all.filter(i => i.checked).length;
  const total = all.length;
  const pct  = total ? Math.round(done / total * 100) : 0;
  const lbl = document.getElementById('prog-label');
  const fill = document.getElementById('prog-fill');
  if (lbl) lbl.textContent = `${done}/${total} 완료 · ${pct}%`;
  if (fill) {
    fill.style.width = `${pct}%`;
    fill.classList.toggle('complete', pct === 100);
  }
  if (pct === 100 && !celebrationFired) {
    celebrationFired = true;
    setTimeout(triggerCelebration, 800);
  }
  if (typeof checkLoopCompletion === 'function') checkLoopCompletion();
}

      </div>

    </div>
  </div>`;
}

function togglePomoCollapse() {
  const w = document.getElementById('pomoWidget');
  if (w) w.classList.toggle('collapsed');
}

function initPomoDrag() {
  const widget = document.getElementById('pomoWidget');
  const handle = document.getElementById('pomoDragHandle');
  if (!widget || !handle) return;

  // Restore saved position
  const saved = JSON.parse(localStorage.getItem('pomo-pos') || 'null');
  if (saved) {
    widget.style.right = 'auto';
    widget.style.bottom = 'auto';
    widget.style.left = saved.left + 'px';
    widget.style.top  = saved.top  + 'px';
  }

  let dragging = false, ox = 0, oy = 0;

  function startDrag(cx, cy) {
    dragging = true;
    const r = widget.getBoundingClientRect();
    ox = cx - r.left;
    oy = cy - r.top;
    widget.classList.add('dragging');
    widget.style.right = 'auto';
    widget.style.bottom = 'auto';
    widget.style.transition = 'none';
  }
  function moveDrag(cx, cy) {
    if (!dragging) return;
    let left = cx - ox;
    let top  = cy - oy;
    // Clamp to viewport
    left = Math.max(0, Math.min(window.innerWidth  - widget.offsetWidth,  left));
    top  = Math.max(0, Math.min(window.innerHeight - widget.offsetHeight, top));
    widget.style.left = left + 'px';
    widget.style.top  = top  + 'px';
  }
  function endDrag() {
    if (!dragging) return;
    dragging = false;
    widget.classList.remove('dragging');
    localStorage.setItem('pomo-pos', JSON.stringify({
      left: parseFloat(widget.style.left),
      top:  parseFloat(widget.style.top)
    }));
  }

  // Mouse
  handle.addEventListener('mousedown',  e => { e.preventDefault(); startDrag(e.clientX, e.clientY); });
  document.addEventListener('mousemove', e => moveDrag(e.clientX, e.clientY));
  document.addEventListener('mouseup',   endDrag);

  // Touch
  handle.addEventListener('touchstart',  e => { e.preventDefault(); startDrag(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
  document.addEventListener('touchmove',  e => { if (dragging) { e.preventDefault(); moveDrag(e.touches[0].clientX, e.touches[0].clientY); } }, { passive: false });
  document.addEventListener('touchend',   endDrag);
}

/* ══════════════════════════════════════════
   POMODORO TIMER
   ══════════════════════════════════════════ */
let loopMinutes = parseInt(localStorage.getItem('loop-minutes') || '50');
let pomoTimer = null;
let pomoTimeLeft = loopMinutes * 60;
let isPomoRunning = false;
let isFocusMode = true; // true = focus, false = rest

function setLoopMode(min) {
  loopMinutes = min;
  localStorage.setItem('loop-minutes', String(min));
  const btn25 = document.getElementById('mode25');
  const btn50 = document.getElementById('mode50');
  if (btn25) btn25.classList.toggle('active', min === 25);
  if (btn50) btn50.classList.toggle('active', min === 50);
  // 현재 멈춤 상태일 때만 시간 재설정
  if (!isPomoRunning && isFocusMode) {
    pomoTimeLeft = min * 60;
    updatePomoDisplay();
  }
}

function updatePomoDisplay() {
  const m = Math.floor(pomoTimeLeft / 60);
  const s = pomoTimeLeft % 60;
  const timeEl = document.getElementById('pomoTime');
  if(timeEl) timeEl.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function togglePomodoro() {
  const btn = document.getElementById('pomoToggleBtn');
  if (isPomoRunning) {
    clearInterval(pomoTimer);
    isPomoRunning = false;
    if(btn) btn.textContent = '▶';
  } else {
    isPomoRunning = true;
    if(btn) btn.textContent = '⏸';
    pomoTimer = setInterval(() => {
      pomoTimeLeft--;
      if (pomoTimeLeft <= 0) {
        // Switch modes
        isFocusMode = !isFocusMode;
        pomoTimeLeft = isFocusMode ? loopMinutes * 60 : 10 * 60;
        const modeEl = document.getElementById('pomoMode');
        if(modeEl) {
          modeEl.textContent = isFocusMode ? 'FOCUS' : 'REST';
          modeEl.style.color = isFocusMode ? 'var(--text-muted)' : 'var(--accent-eng)';
        }
        // Play bell
        try {
          const actx = new (window.AudioContext || window.webkitAudioContext)();
          const osc = actx.createOscillator();
          osc.type = 'sine';
          osc.frequency.setValueAtTime(800, actx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(300, actx.currentTime + 1.5);
          const gain = actx.createGain();
          gain.gain.setValueAtTime(0.5, actx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, actx.currentTime + 1.5);
          osc.connect(gain); gain.connect(actx.destination);
          osc.start(); osc.stop(actx.currentTime + 1.5);
        } catch(e) {}
      }
      updatePomoDisplay();
    }, 1000);
  }
}

function resetPomodoro() {
  clearInterval(pomoTimer);
  isPomoRunning = false;
  isFocusMode = true;
  pomoTimeLeft = loopMinutes * 60;
  const btn = document.getElementById('pomoToggleBtn');
  if(btn) btn.textContent = '▶';
  const modeEl = document.getElementById('pomoMode');
  if(modeEl) {
    modeEl.textContent = 'FOCUS';
    modeEl.style.color = 'var(--text-muted)';
  }
  updatePomoDisplay();
}

/* ══════════════════════════════════════════
   WEB AUDIO API - MULTI-NOISE ENGINE
   ══════════════════════════════════════════ */
let audioCtx = null;
let noiseNode = null;
let masterGain = null;
let currentNoiseType = 'off';

function getOrCreateCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.5;
    masterGain.connect(audioCtx.destination);
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function stopNoise() {
  if (noiseNode) { try { noiseNode.stop(); noiseNode.disconnect(); } catch(e){} noiseNode = null; }
}

function makeNoiseBuffer(type) {
  const ctx = getOrCreateCtx();
  const sr = ctx.sampleRate;
  const buf = ctx.createBuffer(1, sr * 4, sr);
  const d = buf.getChannelData(0);
  if (type === 'white') {
    for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
  } else if (type === 'pink') {
    let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
    for (let i = 0; i < d.length; i++) {
      const w = Math.random() * 2 - 1;
      b0 = 0.99886*b0 + w*0.0555179; b1 = 0.99332*b1 + w*0.0750759;
      b2 = 0.96900*b2 + w*0.1538520; b3 = 0.86650*b3 + w*0.3104856;
      b4 = 0.55000*b4 + w*0.5329522; b5 = -0.7616*b5 - w*0.0168980;
      d[i] = (b0+b1+b2+b3+b4+b5+b6+w*0.5362) * 0.11;
      b6 = w * 0.115926;
    }
  } else if (type === 'rain') {
    // Brown noise with mild lowpass
    let last = 0;
    for (let i = 0; i < d.length; i++) {
      const w = Math.random() * 2 - 1;
      d[i] = (last + 0.02*w) / 1.02;
      last = d[i];
      d[i] *= 3.5;
    }
  } else if (type === 'ocean') {
    // Low-frequency undulation (waves)
    let last = 0;
    for (let i = 0; i < d.length; i++) {
      const w = Math.random() * 2 - 1;
      d[i] = (last + 0.005*w) / 1.005;
      last = d[i];
      d[i] *= 6.0;
    }
  }
  return buf;
}

function changeNoiseType(type) {
  // Update chip UI
  ['off','rain','white','pink','ocean'].forEach(t => {
    const el = document.getElementById('nc-' + t);
    if (el) el.classList.toggle('active', t === type);
  });
  currentNoiseType = type;

  stopNoise();
  if (type === 'off') return;

  const ctx = getOrCreateCtx();
  const buf = makeNoiseBuffer(type);
  noiseNode = ctx.createBufferSource();
  noiseNode.buffer = buf;
  noiseNode.loop = true;

  // Type-specific filter chain
  if (type === 'rain') {
    const f = ctx.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = 1100;
    noiseNode.connect(f); f.connect(masterGain);
  } else if (type === 'ocean') {
    const f = ctx.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = 350;
    noiseNode.connect(f); f.connect(masterGain);
  } else if (type === 'pink') {
    const f = ctx.createBiquadFilter(); f.type = 'highshelf'; f.frequency.value = 6000; f.gain.value = -4;
    noiseNode.connect(f); f.connect(masterGain);
  } else {
    noiseNode.connect(masterGain);
  }
  noiseNode.start(0);
}

function changeVolume(val) {
  if (masterGain) masterGain.gain.value = val / 100;
}

// Legacy alias (if anything still calls it)
function toggleRainNoise() { changeNoiseType(currentNoiseType === 'off' ? 'rain' : 'off'); }

async function analyzeWeeklyRetro() {

  if(box) { box.style.display = 'block'; box.innerHTML = '<span style="color:var(--text-muted)">응답을 기다리는 중...</span>'; }

  const prompt = `당신은 시험(수학, 영어)을 준비하는 학생의 페이스메이커이자 멘토입니다.
학생이 작성한 이번 주 회고록과 오늘 회고록을 읽고, 따뜻하면서도 뼈있는 조언을 3~4문장으로 간결하게 작성해주세요.

[오늘의 회고]
${dailyMemo}

[이번 주 회고]
${weeklyMemo}`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',

        messages: [{ role: 'user', content: prompt }]
      })
    });

    if(!response.ok) {
      const errText = await response.text();
      try {

        throw new Error(errJson.error?.message || JSON.stringify(errJson));

        throw new Error(errText);

    const data = await response.json();

      box.innerHTML = '';

    if(btn) { btn.disabled = false; btn.innerHTML = '<span>✨ 다시 시도하기</span>'; }
  }
}

/* ══════════════════════════════════════════
   MAIN INITIALIZATION
   ══════════════════════════════════════════ */
async function init() {
  const app = document.getElementById('app');

  // Initialize hero immediately
  document.getElementById('heroDate').textContent = todayFmt();
  const ddayVal = dday();
  document.getElementById('ddayNum').textContent = 'D-' + ddayVal;
  // Animate D-day ring (total study period ~550 days from 2025-07-01)
  const totalDays = 550;
  const circumference = 263.9;
  const ratio = Math.min(1, Math.max(0, (totalDays - ddayVal) / totalDays));
  const offset = circumference * (1 - ratio);
  setTimeout(() => {
    const ring = document.getElementById('ddayRingFill');
    if (ring) ring.style.strokeDashoffset = offset;
  }, 300);

  // Load streak from storage
  const streakData = getStreakData();
  renderStreak(streakData.streak);

  // Try cache first for instant render
  const cached = getCachedData();
  if (cached && cached.content) {
    try {
      checklistPageId = cached.checklistPageId;
      const parsed = parsePage(cached.content);
      if (parsed) {
        renderApp(parsed);
        // Continue to fetch fresh data in background
      }
    } catch { /* cache parse failed, will load fresh */ }
  }

  // Fetch from Notion
  try {
    // 1. Planner main → extract checklist subpage matching TODAY's date range
    const planRes  = await safeApiCall(FETCH, { id: PLANNER_ID });
    const planData = planRes.structuredContent ?? JSON.parse(planRes.content[0].text);
    const planText = planData.text || '';

    const subMatches = [...planText.matchAll(/<page url="([^"]+)">([^<]*체크리스트[^<]*)<\/page>/g)];
    const now = _targetDate();
    const todayNum = (now.getMonth() + 1) * 100 + now.getDate();

    const candidates = subMatches.map(m => {
      const url = m[1], title = m[2];
      const rangeM = title.match(/(\d{1,2})\s*\/\s*(\d{1,2})\s*[~～]\s*(\d{1,2})\s*\/\s*(\d{1,2})/);
      const idM = url.match(/\/p\/([a-f0-9]+)/i);
      if (!idM) return null;
      let startNum = null, endNum = null;
      if (rangeM) {
        startNum = parseInt(rangeM[1]) * 100 + parseInt(rangeM[2]);
        endNum   = parseInt(rangeM[3]) * 100 + parseInt(rangeM[4]);
      }
      return { id: idM[1], title, startNum, endNum };
    }).filter(Boolean);

    // Prefer the page whose date range contains today
    let match = candidates.find(c => c.startNum !== null && todayNum >= c.startNum && todayNum <= c.endNum);
    // Otherwise, the closest upcoming week (smallest startNum >= today)
    if (!match) {
      const upcoming = candidates.filter(c => c.startNum !== null && c.startNum >= todayNum).sort((a,b) => a.startNum - b.startNum);
      match = upcoming[0];
    }
    // Otherwise, the most recent past week (largest endNum <= today)
    if (!match) {
      const past = candidates.filter(c => c.endNum !== null && c.endNum <= todayNum).sort((a,b) => b.endNum - a.endNum);
      match = past[0];
    }
    // Last resort: fall back to the last linked page (old behavior)
    if (!match && candidates.length > 0) match = candidates[candidates.length - 1];

    if (match) checklistPageId = match.id;

    // 2. Search fallback
    if (!checklistPageId) {
      const sr = await safeApiCall(SEARCH, { query: '일별 체크리스트', page_size: 5 });
      const sd = sr.structuredContent ?? JSON.parse(sr.content[0].text);
      const pages = (sd.results || [])
        .filter(r => r.type === 'page' && r.title?.includes('체크리스트'))
        .sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
      if (pages.length) checklistPageId = pages[0].id;
    }

    if (!checklistPageId) {
      app.innerHTML = '<div class="state err">체크리스트 페이지를 찾을 수 없습니다<small>Notion에 체크리스트 페이지가 있는지 확인해주세요</small></div>';
      return;
    }

    // 3. Fetch checklist page
    const fr = await safeApiCall(FETCH, { id: checklistPageId });
    const fd = fr;
    const raw = fd.text || '';

    // 4. Extract <content>
    const cm = raw.match(/<content>([\s\S]*?)<\/content>/);
    const content = cm ? cm[1] : raw;

    // 5. Cache the content
    setCachedData(checklistPageId, content);

    // 6. Parse & render
    const parsed = parsePage(content);
    if (!parsed) {
      app.innerHTML = `<div class="state err">오늘(${todayKey()}) 섹션 없음<small>Notion에 오늘 날짜 섹션을 추가하거나\n새 주차 체크리스트가 필요합니다.</small></div>`;
      return;
    }
    renderApp(parsed);

  } catch (e) {
    const errMsg = e.message || String(e);
    if (parsedData) {
      // 캐시 데이터는 있지만 최신 동기화 실패 — 에러 내용 + 재시도 버튼 표시
      const syncErr = document.getElementById('sync-err-banner');
      if (syncErr) {
        syncErr.innerHTML = `⚠️ 동기화 실패: <em>${esc(errMsg.slice(0, 80))}</em> &nbsp;<button onclick="document.getElementById('sync-err-banner').remove();init()" style="font-size:.72rem;padding:2px 8px;border:1px solid rgba(255,255,255,.3);border-radius:6px;background:none;color:inherit;cursor:pointer">재시도</button>`;
        syncErr.style.display = 'block';
      } else {
        toast('⚠️ 동기화 실패: ' + errMsg.slice(0, 60), true);
      }
    } else {
      app.innerHTML = `<div class="state err">오류 발생<small>${esc(errMsg)}</small></div>`;
    }
  }
}

// Initialize theme first, then app
initTheme();

// 날짜 모드 (월별에서 넘어온 경우) → 뒤로 버튼 표시
if (IS_DATE_MODE) {
  const backBtn = document.getElementById('backToMonthly');
  if (backBtn) backBtn.style.display = 'block';
}

// 서버에서 토큰 복원 후 init 실행
restoreTokenFromServer().then(() => {
  if (!getNotionToken()) {
    // 토큰 없음 → 설정 모달 표시
    showTokenSetup();
  } else {
    closeTokenSetup();
    init();
  }
});
</script>
</body>
</html>
