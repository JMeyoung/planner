<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⏱️ 타임어택 타이머 - 편입 영어 문법</title>
<link rel="icon" href="/app-icon.png">
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
/* ── 🌆 Sunset Twilight Theme ── */
:root {
  --glass-noise: none;
  --bg-primary: linear-gradient(180deg, #35235d 0%, #8c4272 50%, #d87056 100%);
  --bg-secondary: rgba(255, 255, 255, 0.18);
  --bg-card: rgba(255, 255, 255, 0.12);
  --bg-card-hover: rgba(255, 255, 255, 0.22);
  --text-primary: #ffffff;
  --text-secondary: rgba(255, 255, 255, 0.85);
  --text-muted: rgba(255, 255, 255, 0.6);
  --border: rgba(255, 255, 255, 0.35);
  --border-subtle: rgba(255, 255, 255, 0.18);
  --border-highlight: rgba(255, 255, 255, 0.6);
  --shadow: 0 8px 32px rgba(30, 10, 40, 0.2);
  --shadow-sm: 0 4px 12px rgba(30, 10, 40, 0.15);
  --shadow-lg: 0 16px 48px rgba(30, 10, 40, 0.25);
  --glass-blur: blur(12px) saturate(120%);
  --accent-color: #ffffff;
  --toast-bg: rgba(255, 255, 255, 0.9);
  --card-radius: 16px;
  --transition-spring: 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  --transition-fast: 0.15s ease;
  --transition-med: 0.3s ease;
}

[data-theme="dark"] {
  --bg-primary: linear-gradient(180deg, #1d1236 0%, #521c3b 50%, #8c3c2a 100%);
  --bg-secondary: rgba(255, 255, 255, 0.05);
  --bg-card: rgba(0, 0, 0, 0.3);
  --bg-card-hover: rgba(0, 0, 0, 0.4);
  --text-primary: #ffffff;
  --text-secondary: rgba(255, 255, 255, 0.8);
  --text-muted: rgba(255, 255, 255, 0.5);
  --border: rgba(255, 255, 255, 0.18);
  --border-subtle: rgba(255, 255, 255, 0.1);
  --border-highlight: rgba(255, 255, 255, 0.3);
  --shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
  --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.4);
  --shadow-lg: 0 16px 48px rgba(0, 0, 0, 0.55);
  --toast-bg: rgba(0, 0, 0, 0.85);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html {
  -webkit-text-size-adjust: 100%;
  scroll-behavior: smooth;
  background: var(--bg-primary);
  background-attachment: fixed;
}

body {
  font-family: 'Pretendard Variable', 'Pretendard', -apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif;
  background: transparent !important;
  color: var(--text-primary);
  min-height: 100vh;
  line-height: 1.6;
  transition: background var(--transition-med), color var(--transition-med);
  overflow-x: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px;
}

/* Header & Nav */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  width: 100%;
  max-width: 600px;
  margin-bottom: 24px;
}

.back-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: var(--text-secondary);
  font-size: 0.85rem;
  font-weight: 600;
  text-decoration: none;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  padding: 8px 16px;
  border-radius: 20px;
  backdrop-filter: var(--glass-blur);
  transition: all var(--transition-fast);
}
.back-btn:hover {
  background: var(--bg-card-hover);
  border-color: var(--border-highlight);
  transform: translateX(-2px);
}

.header-right {
  display: flex;
  gap: 8px;
}

.icon-btn {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--bg-secondary);
  color: var(--text-primary);
  font-size: 1.1rem;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  backdrop-filter: var(--glass-blur);
  transition: all var(--transition-fast);
}
.icon-btn:hover {
  transform: scale(1.08);
  background: var(--bg-card-hover);
}
.icon-btn:active {
  transform: scale(0.95);
}

/* Container */
.container {
  width: 100%;
  max-width: 600px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

/* Glass Card */
.card {
  background: var(--bg-card);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  border: 1px solid var(--border);
  border-radius: var(--card-radius);
  padding: 28px 24px;
  box-shadow: var(--shadow);
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  position: relative;
  overflow: hidden;
}

.card-title {
  font-size: 1.25rem;
  font-weight: 800;
  margin-bottom: 4px;
  letter-spacing: -0.5px;
}
.card-subtitle {
  font-size: 0.85rem;
  color: var(--text-secondary);
  margin-bottom: 24px;
}

/* Timer Ring & Clock */
.timer-container {
  position: relative;
  width: 240px;
  height: 240px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 24px;
}

.timer-svg {
  position: absolute;
  top: 0;
  left: 0;
  width: 240px;
  height: 240px;
  transform: rotate(-90deg);
  overflow: visible;
}

.ring-bg {
  fill: none;
  stroke: rgba(255, 255, 255, 0.12);
  stroke-width: 8;
}

.ring-fill {
  fill: none;
  stroke: #ffffff;
  stroke-width: 8;
  stroke-linecap: round;
  transition: stroke-dashoffset 0.1s linear;
}

.time-display {
  font-size: 3.2rem;
  font-weight: 800;
  font-variant-numeric: tabular-nums;
  letter-spacing: -1px;
  z-index: 10;
  text-shadow: 0 0 16px rgba(255, 255, 255, 0.2);
  cursor: pointer;
  transition: transform var(--transition-fast);
}
.time-display:hover {
  transform: scale(1.05);
}

/* Inline Time Editor */
.time-edit-container {
  z-index: 15;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
}

.time-input {
  width: 76px;
  background: transparent;
  border: none;
  border-bottom: 2.5px solid rgba(255, 255, 255, 0.6);
  color: #ffffff;
  font-size: 2.8rem;
  font-weight: 800;
  text-align: center;
  outline: none;
  font-family: inherit;
}
.time-input::-webkit-outer-spin-button,
.time-input::-webkit-inner-spin-button {
  -webkit-appearance: none;
  margin: 0;
}
.time-input {
  -moz-appearance: textfield;
}
.time-input:focus {
  border-color: #ffffff;
}

/* Timer Actions */
.btn-group {
  display: flex;
  gap: 12px;
  margin-bottom: 8px;
  width: 100%;
  justify-content: center;
}

.btn {
  padding: 12px 28px;
  border-radius: 24px;
  border: none;
  font-family: inherit;
  font-size: 0.95rem;
  font-weight: 700;
  cursor: pointer;
  transition: all var(--transition-fast);
  display: inline-flex;
  align-items: center;
  gap: 6px;
  box-shadow: var(--shadow-sm);
}

.btn-primary {
  background: #ffffff;
  color: #1d1236;
}
.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(255, 255, 255, 0.35);
}

.btn-secondary {
  background: rgba(255, 255, 255, 0.15);
  border: 1px solid var(--border);
  color: #ffffff;
}
.btn-secondary:hover {
  background: rgba(255, 255, 255, 0.25);
  transform: translateY(-2px);
}

/* Settings Form */
.settings-panel {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 16px;
  text-align: left;
}

.settings-header {
  font-size: 1rem;
  font-weight: 800;
  border-bottom: 1px solid var(--border-subtle);
  padding-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.form-group {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.form-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.form-label {
  font-size: 0.88rem;
  font-weight: 600;
  color: var(--text-secondary);
}

/* Switch UI */
.switch {
  position: relative;
  display: inline-block;
  width: 46px;
  height: 24px;
}
.switch input {
  opacity: 0;
  width: 0;
  height: 0;
}
.slider {
  position: absolute;
  cursor: pointer;
  inset: 0;
  background-color: rgba(255, 255, 255, 0.2);
  transition: .3s;
  border-radius: 24px;
  border: 1px solid var(--border);
}
.slider:before {
  position: absolute;
  content: "";
  height: 16px;
  width: 16px;
  left: 3px;
  bottom: 3px;
  background-color: white;
  transition: .3s;
  border-radius: 50%;
}
input:checked + .slider {
  background-color: #10b981;
}
input:checked + .slider:before {
  transform: translateX(22px);
}

select {
  width: 100%;
  padding: 8px 12px;
  background: rgba(255, 255, 255, 0.1);
  color: #ffffff;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-family: inherit;
  font-size: 0.85rem;
  outline: none;
  cursor: pointer;
}
select option {
  background: #35235d;
  color: #ffffff;
}

.slider-input {
  width: 100%;
  height: 6px;
  background: rgba(255, 255, 255, 0.2);
  border-radius: 3px;
  outline: none;
  -webkit-appearance: none;
}
.slider-input::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: #ffffff;
  cursor: pointer;
}

/* Visual Wave Effect */
.wave-container {
  display: flex;
  align-items: center;
  gap: 4px;
  height: 30px;
  margin-bottom: 8px;
}
.wave-bar {
  width: 3px;
  height: 6px;
  background-color: rgba(255, 255, 255, 0.4);
  border-radius: 2px;
  transition: height 0.15s ease;
}
.wave-active .wave-bar {
  background-color: #34d399;
  animation: bounce 0.8s infinite ease-in-out alternate;
}
.wave-active .wave-bar:nth-child(2) { animation-delay: 0.1s; }
.wave-active .wave-bar:nth-child(3) { animation-delay: 0.2s; }
.wave-active .wave-bar:nth-child(4) { animation-delay: 0.3s; }
.wave-active .wave-bar:nth-child(5) { animation-delay: 0.4s; }
.wave-active .wave-bar:nth-child(6) { animation-delay: 0.3s; }
.wave-active .wave-bar:nth-child(7) { animation-delay: 0.2s; }
.wave-active .wave-bar:nth-child(8) { animation-delay: 0.1s; }

@keyframes bounce {
  100% { height: 28px; }
}

/* Toast */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--toast-bg);
  color: var(--text-primary);
  border: 1px solid var(--border);
  padding: 10px 20px;
  border-radius: 20px;
  font-size: 0.85rem;
  font-weight: 600;
  box-shadow: var(--shadow-lg);
  display: none;
  z-index: 1000;
}

/* Responsive */
@media (max-width: 480px) {
  .time-display { font-size: 2.6rem; }
  .timer-container { width: 200px; height: 200px; }
  .btn { padding: 10px 20px; font-size: 0.88rem; }
}
</style>
  <link rel="stylesheet" href="liquid-glass.css?v=7">

<body class="theme-liquid-glass">

<header>
  <a href="/" class="back-btn">← 월별 플래너</a>
  <div class="header-right">
    <button class="theme-toggle glass-circle" id="themeToggle" onclick="toggleTheme()" aria-label="테마 전환" style="position: fixed !important; top: 14px !important; right: 14px !important;">🌙</button>
  </div>
</header>

<div class="container">
  <!-- Timer Dashboard -->
  <div class="card">
    <div class="card-title">⏱️ 문법 타임어택 타이머</div>
    <div class="card-subtitle" id="timerSubtitle">목표: 10분 (30초마다 자동으로 종소리 알림)</div>
    
    <div class="timer-container">
      <svg class="timer-svg" viewBox="0 0 240 240">
        <circle class="ring-bg" cx="120" cy="120" r="105"></circle>
        <circle class="ring-fill" id="timerRing" cx="120" cy="120" r="105" stroke-dasharray="660" stroke-dashoffset="0"></circle>
      </svg>
      <!-- Clickable Time Display -->
      <div class="time-display" id="timeStr" onclick="enterEditMode()" title="클릭하여 시간 수정">10:00</div>
      
      <!-- Inline Editors -->
      <div class="time-edit-container" id="timeEdit" style="display: none;">
        <input type="number" id="inputMin" class="time-input" min="0" max="999" value="10" onkeydown="handleEditKey(event)" onblur="exitEditMode(true)">
        <span style="font-size: 2.5rem; font-weight: 800; color: #fff; line-height: 1;">:</span>
        <input type="number" id="inputSec" class="time-input" min="0" max="59" value="00" onkeydown="handleEditKey(event)" onblur="exitEditMode(true)">
      </div>
    </div>
    
    <div id="editHint" style="font-size: 0.72rem; color: var(--text-muted); margin-top: -12px; margin-bottom: 20px; transition: opacity var(--transition-fast);">시간을 클릭해 편집할 수 있습니다</div>
    
    <div class="wave-container" id="waveContainer">
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
    </div>

    <div class="btn-group">
      <button class="btn btn-primary" id="startBtn" onclick="toggleTimer()">시작</button>
      <button class="btn btn-secondary" onclick="resetTimer()">초기화</button>
    </div>
  </div>

  <!-- Settings Panel -->
  <div class="card">
    <div class="settings-panel">
      <div class="settings-header">⚙️ 타이머 및 알림 설정</div>
      
      <div class="form-row">
        <span class="form-label">30초 주기 종소리 알림</span>
        <label class="switch">
          <input type="checkbox" id="bellEnabled" checked>
          <span class="slider"></span>
        </label>
      </div>

      <div class="form-group">
        <span class="form-label">알림 종소리 종류</span>
        <select id="soundTypeSelect">
          <option value="chime">맑은 침묵의 종소리 (Sweet Chime)</option>
          <option value="bell">클래식 브라스 벨 (Classic Bell)</option>
          <option value="beep">부드러운 신호음 (Soft Beep)</option>
        </select>
      </div>

      <div class="form-group">
        <div class="form-row">
          <span class="form-label">알림 음량</span>
          <span class="form-label" id="volumeLabel" style="font-size:0.8rem">80%</span>
        </div>
        <input type="range" id="volumeSlider" class="slider-input" min="0" max="1" step="0.05" value="0.8" oninput="updateVolumeLabel(this.value)">
      </div>

      <div class="btn-group" style="margin-top: 8px;">
        <button class="btn btn-secondary" onclick="testBellSound()" style="padding:8px 20px; font-size:0.85rem">🔔 종소리 미리듣기</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// Timer Configuration
let TOTAL_DURATION = 10 * 60; // Default: 10 minutes in seconds (600s)
let timerInterval = null;
let remainingTime = TOTAL_DURATION;
let isRunning = false;

// Audio Configuration
let audioCtx = null;

// High-accuracy tracking
let startTime = null;
let pausedTime = 0; // accumulated elapsed seconds
let lastBellHalfMinutes = 0; // tracks how many 30-sec boundaries we've hit

// SVG Ring Configuration
const ring = document.getElementById('timerRing');
const radius = ring.r.baseVal.value;
const circumference = 2 * Math.PI * radius;
ring.style.strokeDasharray = `${circumference} ${circumference}`;

function updateProgress() {
  const percent = remainingTime / TOTAL_DURATION;
  const offset = circumference - (percent * circumference);
  ring.style.strokeDashoffset = offset;
}

// Format seconds into MM:SS
function formatTime(sec) {
  const m = Math.floor(sec / 60).toString().padStart(2, '0');
  const s = Math.floor(sec % 60).toString().padStart(2, '0');
  return `${m}:${s}`;
}

function updateTimeDisplay() {
  document.getElementById('timeStr').textContent = formatTime(remainingTime);
  updateProgress();
}

// Timer Controls
function toggleTimer() {
  // If editing time, exit and save first
  if (document.getElementById('timeEdit').style.display === 'flex') {
    exitEditMode(true);
  }
  initAudio();
  if (isRunning) {
    pauseTimer();
  } else {
    startTimer();
  }
}

function startTimer() {
  if (remainingTime <= 0) return;
  isRunning = true;
  document.getElementById('startBtn').textContent = '일시정지';
  document.getElementById('startBtn').classList.add('btn-secondary');
  document.getElementById('startBtn').classList.remove('btn-primary');
  document.getElementById('waveContainer').classList.add('wave-active');
  document.getElementById('editHint').style.opacity = '0';
  document.getElementById('timeStr').style.cursor = 'default';
  
  if (audioCtx && audioCtx.state === 'suspended') {
    audioCtx.resume();
  }

  // Set precise start timestamp
  startTime = performance.now() - (pausedTime * 1000);

  // High-accuracy interval (100ms ticks to prevent background tab drift and skip bugs)
  timerInterval = setInterval(() => {
    const now = performance.now();
    const elapsedSeconds = (now - startTime) / 1000;
    
    remainingTime = Math.max(0, TOTAL_DURATION - elapsedSeconds);
    updateTimeDisplay();
    
    // Check for 30-second interval bells
    const currentHalfMinutes = Math.floor(elapsedSeconds / 30);
    if (currentHalfMinutes > lastBellHalfMinutes) {
      if (document.getElementById('bellEnabled').checked) {
        playBellSound();
        const displayMin = Math.floor((currentHalfMinutes * 30) / 60);
        const displaySec = (currentHalfMinutes * 30) % 60;
        const timeStr = displayMin > 0 ? `${displayMin}분 ${displaySec}초` : `${displaySec}초`;
        showToast(`🔔 ${timeStr} 경과 알림 종소리 재생`);
      }
      lastBellHalfMinutes = currentHalfMinutes;
    }
    
    if (remainingTime <= 0) {
      pauseTimer();
      playBellSound();
      setTimeout(playBellSound, 500); // double chime
      showToast('🎉 타임어택 종료! 수고하셨습니다!');
    }
  }, 100);
}

function pauseTimer() {
  isRunning = false;
  clearInterval(timerInterval);
  pausedTime = TOTAL_DURATION - remainingTime;
  document.getElementById('startBtn').textContent = '시작';
  document.getElementById('startBtn').classList.remove('btn-secondary');
  document.getElementById('startBtn').classList.add('btn-primary');
  document.getElementById('waveContainer').classList.remove('wave-active');
  document.getElementById('editHint').style.opacity = '1';
  document.getElementById('timeStr').style.cursor = 'pointer';
}

function resetTimer() {
  pauseTimer();
  remainingTime = TOTAL_DURATION;
  pausedTime = 0;
  lastBellHalfMinutes = 0;
  updateTimeDisplay();
}

// Interactive Time Edit Logic
function enterEditMode() {
  if (isRunning) return;
  
  const timeStrEl = document.getElementById('timeStr');
  const timeEditEl = document.getElementById('timeEdit');
  const inputMin = document.getElementById('inputMin');
  const inputSec = document.getElementById('inputSec');
  
  const currentMin = Math.floor(remainingTime / 60);
  const currentSec = Math.floor(remainingTime % 60);
  
  inputMin.value = currentMin;
  inputSec.value = currentSec.toString().padStart(2, '0');
  
  timeStrEl.style.display = 'none';
  timeEditEl.style.display = 'flex';
  
  inputMin.focus();
  inputMin.select();
}

let isExitingEdit = false;
function exitEditMode(save) {
  if (isExitingEdit) return;
  isExitingEdit = true;
  
  setTimeout(() => {
    const timeStrEl = document.getElementById('timeStr');
    const timeEditEl = document.getElementById('timeEdit');
    
    if (save) {
      let min = parseInt(document.getElementById('inputMin').value) || 0;
      let sec = parseInt(document.getElementById('inputSec').value) || 0;
      
      if (min < 0) min = 0;
      if (sec < 0) sec = 0;
      if (sec > 59) {
        min += Math.floor(sec / 60);
        sec = sec % 60;
      }
      
      TOTAL_DURATION = min * 60 + sec;
      remainingTime = TOTAL_DURATION;
      pausedTime = 0;
      lastBellHalfMinutes = 0;
      
      // Update subtitle dynamically
      document.getElementById('timerSubtitle').textContent = `목표: ${min > 0 ? min + '분 ' : ''}${sec > 0 ? sec + '초' : ''} (30초마다 자동으로 종소리 알림)`;
    }
    
    updateTimeDisplay();
    
    timeEditEl.style.display = 'none';
    timeStrEl.style.display = 'block';
    
    isExitingEdit = false;
  }, 100);
}

function handleEditKey(e) {
  if (e.key === 'Enter') {
    exitEditMode(true);
  } else if (e.key === 'Escape') {
    exitEditMode(false);
  }
}

// Synthesized Audio engine (Web Audio API)
function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
}

function playBellSound() {
  initAudio();
  if (audioCtx.state === 'suspended') {
    audioCtx.resume();
  }
  
  const volume = parseFloat(document.getElementById('volumeSlider').value);
  const soundType = document.getElementById('soundTypeSelect').value;
  const now = audioCtx.currentTime;
  
  if (soundType === 'chime') {
    const frequencies = [880, 1100, 1320, 1760];
    const gains = [0.4, 0.25, 0.15, 0.1];
    
    frequencies.forEach((freq, idx) => {
      const osc = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, now);
      
      gainNode.gain.setValueAtTime(gains[idx] * volume, now);
      gainNode.gain.exponentialRampToValueAtTime(0.0001, now + 2.5);
      
      osc.connect(gainNode);
      gainNode.connect(audioCtx.destination);
      
      osc.start(now);
      osc.stop(now + 2.5);
    });
  } else if (soundType === 'bell') {
    const osc1 = audioCtx.createOscillator();
    const osc2 = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();
    
    osc1.type = 'sine';
    osc1.frequency.setValueAtTime(523.25, now);
    
    osc2.type = 'triangle';
    osc2.frequency.setValueAtTime(789.99, now);
    
    gainNode.gain.setValueAtTime(0.3 * volume, now);
    gainNode.gain.exponentialRampToValueAtTime(0.0001, now + 1.8);
    
    osc1.connect(gainNode);
    osc2.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    
    osc1.start(now);
    osc2.start(now);
    osc1.stop(now + 1.8);
    osc2.stop(now + 1.8);
  } else {
    const osc = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();
    
    osc.type = 'sine';
    osc.frequency.setValueAtTime(1000, now);
    
    gainNode.gain.setValueAtTime(0.2 * volume, now);
    gainNode.gain.exponentialRampToValueAtTime(0.0001, now + 0.35);
    
    osc.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    
    osc.start(now);
    osc.stop(now + 0.35);
  }
}

function testBellSound() {
  initAudio();
  playBellSound();
  showToast('🔊 설정된 종소리를 재생했습니다.');
}

function updateVolumeLabel(val) {
  document.getElementById('volumeLabel').textContent = `${Math.round(val * 100)}%`;
}

// Toast Notifications
let toastTimeout = null;
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.style.display = 'block';
  
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => {
    toast.style.display = 'none';
  }, 3000);
}

// Theme Management
function loadTheme() {
  const saved = localStorage.getItem('planner-theme') || 'light';
  document.documentElement.setAttribute('data-theme', saved);
  updateThemeIcon(saved);
}

function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('planner-theme', next);
  updateThemeIcon(next);
}

function updateThemeIcon(theme) {
  const btn = document.getElementById('themeToggle');
  if (btn) btn.textContent = theme === 'dark' ? '☀️' : '🌙';
}

// Audio context unlock on first user click anywhere
document.addEventListener('click', () => {
  initAudio();
  if (audioCtx && audioCtx.state === 'suspended') {
    audioCtx.resume();
  }
}, { once: true });

// Init execution
updateTimeDisplay();
loadTheme();
</script>
